<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>IlyassAI</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<style>
/* ── Grok Exact Clone ── */
:root {
  --bg:       #000;
  --sidebar:  #0a0a0a;
  --border:   rgba(255,255,255,0.08);
  --surface:  rgba(255,255,255,0.05);
  --surface2: rgba(255,255,255,0.09);
  --text:     #ececec;
  --text2:    rgba(255,255,255,0.50);
  --text3:    rgba(255,255,255,0.28);
  --green:    #1db954;
  --blue:     #60a5fa;
  --red:      #f87171;
}
[data-theme="light"] {
  --bg:#fff; --sidebar:#f7f7f7; --border:rgba(0,0,0,0.08);
  --surface:rgba(0,0,0,0.04); --surface2:rgba(0,0,0,0.08);
  --text:#111; --text2:rgba(0,0,0,0.50); --text3:rgba(0,0,0,0.28);
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:"Inter",sans-serif;background:var(--bg);color:var(--text);font-size:15px;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
textarea,input{font-family:inherit}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--surface2);border-radius:4px}

/* ══ LAYOUT ══ */
.layout{display:flex;height:100vh;overflow:hidden}

/* ══ SIDEBAR ══ */
.sidebar{
  width:240px;flex-shrink:0;
  background:var(--sidebar);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;
  padding:12px 8px;
  gap:2px;
}

/* top logo row */
.sb-logo-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:4px 8px 12px;
}
.sb-logo{
  width:28px;height:28px;
  display:flex;align-items:center;justify-content:center;
}
.sb-logo svg{width:24px;height:24px;fill:var(--text)}
.sb-collapse{
  width:28px;height:28px;border-radius:6px;
  display:flex;align-items:center;justify-content:center;
  color:var(--text2);font-size:13px;
  transition:background .15s;
}
.sb-collapse:hover{background:var(--surface2)}

/* nav items */
.sb-nav-item{
  display:flex;align-items:center;gap:10px;
  padding:9px 10px;border-radius:8px;
  font-size:14px;font-weight:500;
  color:var(--text2);cursor:pointer;
  transition:background .15s,color .15s;
}
.sb-nav-item:hover{background:var(--surface);color:var(--text)}
.sb-nav-item.active{background:var(--surface2);color:var(--text)}
.sb-nav-item svg{width:16px;height:16px;flex-shrink:0;opacity:.85}

/* divider */
.sb-divider{height:1px;background:var(--border);margin:8px 4px}

/* section headers */
.sb-section{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 10px 4px;
  font-size:13px;font-weight:600;color:var(--text2);
  cursor:pointer;border-radius:8px;
  transition:background .15s;
}
.sb-section:hover{background:var(--surface)}
.sb-section-arrow{font-size:11px;color:var(--text3)}

.sb-sub-item{
  display:flex;align-items:center;gap:8px;
  padding:7px 10px 7px 14px;
  font-size:13px;color:var(--text2);
  cursor:pointer;border-radius:8px;
  transition:background .15s,color .15s;
}
.sb-sub-item:hover{background:var(--surface);color:var(--text)}
.sb-sub-item svg{width:13px;height:13px;opacity:.7}

.sb-spacer{flex:1}

/* user avatar at bottom */
.sb-user{
  padding:8px 10px;
  display:flex;align-items:center;
}
.sb-avatar{
  width:30px;height:30px;border-radius:50%;
  background:#1db954;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:700;color:#000;
  cursor:pointer;
}

/* ══ MAIN ══ */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}

/* top-right buttons */
.main-topbar{
  display:flex;align-items:center;justify-content:flex-end;
  padding:12px 20px;gap:6px;flex-shrink:0;
}
.topbar-btn{
  display:flex;align-items:center;gap:6px;
  padding:7px 14px;border-radius:8px;
  font-size:13px;font-weight:500;
  color:var(--text2);
  transition:background .15s,color .15s;
}
.topbar-btn:hover{background:var(--surface);color:var(--text)}
.topbar-btn svg{width:15px;height:15px}

/* ══ CHAT AREA ══ */
.chat-area{
  flex:1;overflow-y:auto;
  display:flex;flex-direction:column;
}
.chat-area::-webkit-scrollbar{width:4px}

/* ── home / welcome ── */
.home-view{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:40px 24px;
  gap:0;
}
.home-logo-row{
  display:flex;align-items:center;gap:16px;
  margin-bottom:48px;
}
.home-logo-icon{
  width:52px;height:52px;
  display:flex;align-items:center;justify-content:center;
}
.home-logo-icon svg{width:52px;height:52px;fill:var(--text)}
.home-title{
  font-size:44px;font-weight:700;
  letter-spacing:-.5px;color:var(--text);
}

/* single pill input (home) */
.home-input-wrap{
  width:100%;max-width:680px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:999px;
  display:flex;align-items:center;
  padding:0 6px 0 20px;
  gap:8px;
  transition:border-color .2s,box-shadow .2s;
}
.home-input-wrap:focus-within{
  border-color:rgba(255,255,255,0.20);
  box-shadow:0 0 0 3px rgba(255,255,255,0.04);
}
.home-input-plus{
  color:var(--text2);font-size:18px;font-weight:300;
  flex-shrink:0;
}
.home-input-wrap textarea{
  flex:1;background:none;border:none;outline:none;
  color:var(--text);font-size:15px;
  resize:none;line-height:1.5;
  padding:16px 0;
  max-height:160px;overflow-y:auto;
  scrollbar-width:none;
}
.home-input-wrap textarea::placeholder{color:var(--text3)}
.home-input-wrap textarea::-webkit-scrollbar{display:none}

.home-input-right{
  display:flex;align-items:center;gap:6px;flex-shrink:0;
}

/* Fast selector */
.fast-btn{
  display:flex;align-items:center;gap:4px;
  padding:6px 10px;border-radius:6px;
  font-size:13px;font-weight:500;color:var(--text2);
  transition:background .15s;
}
.fast-btn:hover{background:var(--surface2)}
.fast-btn svg{width:12px;height:12px}

/* mic button */
.mic-btn{
  width:34px;height:34px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  color:var(--text2);transition:background .15s;
}
.mic-btn:hover{background:var(--surface2)}
.mic-btn svg{width:17px;height:17px}

/* send / waveform button (white circle) */
.send-circle-btn{
  width:36px;height:36px;border-radius:50%;
  background:var(--text);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:all .18s;
}
.send-circle-btn:hover:not(:disabled){background:#ccc;transform:scale(1.05)}
.send-circle-btn:disabled{background:var(--surface2);cursor:not-allowed}
.send-circle-btn svg{width:16px;height:16px;fill:var(--bg)}

/* ── chat messages ── */
.messages-view{
  flex:1;
  padding:24px 0 12px;
  display:flex;flex-direction:column;
  gap:4px;
}

.msg-row{
  display:flex;
  padding:6px 20px;
  max-width:760px;margin:0 auto;width:100%;
}
.msg-row.user{justify-content:flex-end}
.msg-row.assistant{justify-content:flex-start;align-items:flex-start;gap:12px}

.user-bubble{
  background:var(--surface2);
  border:1px solid var(--border);
  padding:10px 16px;border-radius:18px 18px 4px 18px;
  font-size:14.5px;line-height:1.65;
  max-width:72%;word-break:break-word;color:var(--text);
}

.ai-avatar-small{
  width:26px;height:26px;flex-shrink:0;margin-top:2px;
}
.ai-avatar-small svg{width:26px;height:26px;fill:var(--text)}

.ai-body{
  flex:1;font-size:14.5px;line-height:1.75;
  color:var(--text);word-break:break-word;
}

/* typing dots */
.typing-indicator{display:flex;align-items:center;gap:4px;padding:8px 0}
.typing-dot{
  width:5px;height:5px;border-radius:50%;
  background:var(--text3);
  animation:dot-pulse 1.4s ease-in-out infinite;
}
.typing-dot:nth-child(2){animation-delay:.2s}
.typing-dot:nth-child(3){animation-delay:.4s}
@keyframes dot-pulse{
  0%,80%,100%{transform:scale(.8);opacity:.4}
  40%{transform:scale(1.2);opacity:1}
}

/* msg actions */
.msg-actions{display:flex;gap:4px;margin-top:8px;opacity:0;transition:opacity .15s}
.msg-row:hover .msg-actions{opacity:1}
.msg-action-btn{
  padding:4px 8px;border-radius:6px;
  font-size:12px;color:var(--text3);
  transition:all .15s;
}
.msg-action-btn:hover{background:var(--surface);color:var(--text2)}

/* markdown */
.ai-body h1{font-size:21px;font-weight:700;margin:18px 0 8px}
.ai-body h2{font-size:18px;font-weight:700;margin:16px 0 8px}
.ai-body h3{font-size:16px;font-weight:600;margin:14px 0 6px}
.ai-body p{margin:0 0 10px}
.ai-body p:last-child{margin-bottom:0}
.ai-body ul,.ai-body ol{padding-left:20px;margin:6px 0 10px}
.ai-body li{margin:4px 0}
.ai-body strong{font-weight:600}
.ai-body em{font-style:italic;color:var(--text2)}
.ai-body a{color:var(--blue)}
.ai-body blockquote{border-left:3px solid var(--border);padding:6px 14px;margin:10px 0;color:var(--text2)}
.ai-body table{width:100%;border-collapse:collapse;margin:12px 0;font-size:13.5px}
.ai-body th{padding:8px 14px;text-align:left;font-weight:600;border-bottom:1px solid var(--border)}
.ai-body td{padding:7px 14px;border-bottom:1px solid var(--border);color:var(--text2)}
.ai-body code{background:var(--surface2);color:#e2b96f;font-family:"JetBrains Mono",monospace;font-size:13px;padding:2px 5px;border-radius:4px}
.ai-body pre{background:#111;border:1px solid var(--border);border-radius:10px;overflow:hidden;margin:10px 0}
.ai-body pre code{background:none;color:#d4d4d4;font-size:13px;padding:14px;display:block;overflow-x:auto}

/* ── bottom input bar (chat mode) ── */
.chat-input-bar{
  flex-shrink:0;
  padding:10px 20px 18px;
  background:var(--bg);
}
.chat-input-pill{
  max-width:760px;margin:0 auto;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:22px;
  overflow:hidden;
  transition:border-color .2s;
}
.chat-input-pill:focus-within{border-color:rgba(255,255,255,0.18)}
.chat-input-pill-top{
  display:flex;align-items:flex-end;
  padding:12px 14px 8px;gap:10px;
}
#chatInput{
  flex:1;background:none;border:none;outline:none;
  color:var(--text);font-size:15px;resize:none;
  line-height:1.6;min-height:26px;max-height:180px;
  overflow-y:auto;padding:0;
  scrollbar-width:thin;
}
#chatInput::placeholder{color:var(--text3)}
.chat-input-pill-bottom{
  display:flex;align-items:center;
  padding:4px 12px 10px;gap:4px;
  border-top:1px solid var(--border);
}
.tool-chip{
  display:flex;align-items:center;gap:5px;
  padding:5px 11px;border-radius:999px;
  font-size:12px;color:var(--text2);
  transition:all .15s;
}
.tool-chip:hover{background:var(--surface2);color:var(--text)}
.tool-chip.active{background:rgba(255,255,255,0.1);color:var(--text)}
.tool-chip svg{width:13px;height:13px}
.pill-spacer{flex:1}

/* model dropdown */
.model-selector{
  display:flex;align-items:center;gap:6px;
  padding:5px 10px;border-radius:999px;
  font-size:13px;font-weight:500;color:var(--text2);
  position:relative;transition:background .15s;
}
.model-selector:hover{background:var(--surface2)}
.model-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pg 2s infinite}
@keyframes pg{0%,100%{opacity:1}50%{opacity:.3}}

.model-dropdown{
  position:absolute;bottom:calc(100% + 8px);right:0;
  background:#111;border:1px solid var(--border);
  border-radius:12px;padding:6px;min-width:220px;
  box-shadow:0 16px 40px rgba(0,0,0,.7);
  z-index:100;display:none;
  animation:fdUp .15s ease;
}
.model-dropdown.open{display:block}
@keyframes fdUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.model-option{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 12px;border-radius:8px;cursor:pointer;transition:background .13s;
}
.model-option:hover,.model-option.selected{background:var(--surface2)}
.model-option-name{font-size:13px;font-weight:500}
.model-option-tag{font-size:11px;color:var(--text3);background:var(--surface2);padding:2px 7px;border-radius:999px}

/* disclaimer */
.input-disclaimer{
  text-align:center;font-size:11.5px;
  color:var(--text3);margin-top:10px;
  max-width:760px;margin-left:auto;margin-right:auto;
}

/* ── Mobile ── */
@media(max-width:768px){
  .sidebar{position:fixed;left:-100%;top:0;bottom:0;z-index:50;transition:left .22s ease}
  .sidebar.open{left:0}
  .main-topbar{padding:10px 14px}
  .msg-row{padding:6px 14px}
  .home-title{font-size:28px}
  .home-logo-icon svg{width:36px;height:36px}
  .user-bubble{max-width:88%}
}

/* ════════════════════════════════
   VOICE PAGE
════════════════════════════════ */
.voice-page {
  flex: 1; display: none; flex-direction: column;
  align-items: center; justify-content: center;
  background: var(--bg); position: relative;
  overflow: hidden;
}
.voice-page.active { display: flex; }

.voice-waveform-wrap {
  display: flex; flex-direction: column;
  align-items: center; gap: 20px;
  flex: 1; justify-content: center;
}
.voice-waveform {
  display: flex; align-items: center; gap: 4px; height: 60px;
}
.voice-bar {
  width: 3px; background: rgba(255,255,255,0.5);
  border-radius: 99px; animation: vbar 1.2s ease-in-out infinite;
  transform-origin: center;
}
.voice-bar:nth-child(1)  { height:12px; animation-delay:0s; }
.voice-bar:nth-child(2)  { height:28px; animation-delay:.1s; }
.voice-bar:nth-child(3)  { height:44px; animation-delay:.2s; }
.voice-bar:nth-child(4)  { height:56px; animation-delay:.3s; }
.voice-bar:nth-child(5)  { height:60px; animation-delay:.4s; }
.voice-bar:nth-child(6)  { height:44px; animation-delay:.3s; }
.voice-bar:nth-child(7)  { height:56px; animation-delay:.2s; }
.voice-bar:nth-child(8)  { height:36px; animation-delay:.1s; }
.voice-bar:nth-child(9)  { height:20px; animation-delay:0s; }
@keyframes vbar {
  0%,100% { transform: scaleY(0.4); opacity: .4; }
  50%      { transform: scaleY(1);   opacity: 1;  }
}
.voice-page.listening .voice-bar { animation-play-state: running; }
.voice-page:not(.listening) .voice-bar { animation-play-state: paused; opacity:.3; }

.voice-speaking-text {
  font-size: 15px; color: rgba(255,255,255,0.5);
  font-weight: 400; letter-spacing: .3px;
}

/* voice bottom card */
.voice-bottom-card {
  width: 100%; max-width: 680px;
  margin: 0 auto 32px;
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border);
  border-radius: 20px;
  overflow: hidden;
}
.voice-card-top {
  padding: 16px 20px 14px;
  font-size: 15px; color: var(--text2);
}
.voice-card-bottom {
  display: flex; align-items: center;
  gap: 6px; padding: 10px 14px 14px;
}
.voice-icon-btn {
  width: 38px; height: 38px; border-radius: 50%;
  background: var(--surface2); border: none;
  display: flex; align-items: center; justify-content: center;
  color: var(--text2); cursor: pointer; transition: all .15s;
  flex-shrink: 0;
}
.voice-icon-btn:hover { background: var(--surface3); color: var(--text); }
.voice-dots-btn {
  width: 38px; height: 38px; border-radius: 50%;
  background: var(--surface2); border: none;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all .15s; gap: 2px;
}
.voice-dot-small { width: 3px; height: 3px; border-radius: 50%; background: var(--text2); }
.voice-assistant-btn {
  display: flex; align-items: center; gap: 7px;
  background: var(--surface2); border: 1px solid var(--border2);
  border-radius: 999px; padding: 7px 14px;
  color: var(--text2); font-size: 13px; cursor: pointer;
  transition: all .15s; margin-left: 4px;
}
.voice-assistant-btn:hover { background: var(--surface3); color: var(--text); }
.voice-stop-btn {
  margin-left: auto;
  background: var(--text); color: var(--bg);
  border: none; border-radius: 999px;
  padding: 9px 22px; font-size: 14px; font-weight: 600;
  cursor: pointer; transition: all .18s;
  font-family: Inter, sans-serif;
}
.voice-stop-btn:hover { background: #ccc; }

/* ════════════════════════════════
   IMAGINE PAGE
════════════════════════════════ */
.imagine-page {
  flex: 1; display: none; flex-direction: column;
  background: var(--bg); overflow: hidden;
}
.imagine-page.active { display: flex; }

.imagine-header {
  padding: 16px 24px 12px;
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
.imagine-header h2 { font-size: 16px; font-weight: 700; color: var(--text); }
.view-all-btn {
  font-size: 13px; color: var(--text2); background: none; border: none;
  cursor: pointer; transition: color .15s;
}
.view-all-btn:hover { color: var(--text); }

/* templates row */
.templates-scroll {
  display: flex; gap: 12px;
  padding: 0 24px 16px;
  overflow-x: auto; flex-shrink: 0;
}
.templates-scroll::-webkit-scrollbar { height: 3px; }
.templates-scroll::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 2px; }

.template-card {
  flex-shrink: 0; width: 160px; height: 110px;
  border-radius: 10px; overflow: hidden;
  position: relative; cursor: pointer;
  background: var(--surface2);
  transition: transform .2s;
}
.template-card:hover { transform: scale(1.02); }
.template-card img { width: 100%; height: 100%; object-fit: cover; }
.template-label {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 6px 10px;
  background: linear-gradient(transparent, rgba(0,0,0,.7));
  font-size: 12px; font-weight: 600; color: #fff;
}

/* discover grid */
.discover-section { flex: 1; overflow-y: auto; padding: 0 24px 16px; }
.discover-section::-webkit-scrollbar { width: 4px; }
.discover-section::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 2px; }

.discover-label { font-size: 16px; font-weight: 700; margin-bottom: 14px; color: var(--text); }
.discover-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 10px;
}
.discover-item {
  border-radius: 10px; overflow: hidden;
  background: var(--surface2); cursor: pointer;
  transition: transform .2s; aspect-ratio: 3/4;
  position: relative;
}
.discover-item:first-child { grid-row: span 2; aspect-ratio: auto; }
.discover-item:hover { transform: scale(1.01); }
.discover-item img { width: 100%; height: 100%; object-fit: cover; }

/* imagine input bar */
.imagine-input-section {
  flex-shrink: 0; padding: 10px 20px 18px;
  background: var(--bg);
}
.imagine-pill {
  max-width: 760px; margin: 0 auto;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 22px; overflow: hidden;
  transition: border-color .2s;
}
.imagine-pill:focus-within { border-color: rgba(255,255,255,0.2); }
.imagine-pill-top {
  display: flex; align-items: flex-end;
  padding: 12px 14px 8px; gap: 10px;
}
#imagineInput {
  flex: 1; background: none; border: none; outline: none;
  color: var(--text); font-size: 15px; resize: none;
  min-height: 26px; max-height: 120px; padding: 0;
  line-height: 1.6;
}
#imagineInput::placeholder { color: var(--text3); }
.imagine-send-btn {
  width: 34px; height: 34px; border-radius: 50%;
  background: var(--text); color: var(--bg); border: none;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; flex-shrink: 0; transition: all .18s;
}
.imagine-send-btn:hover { background: #ccc; transform: scale(1.05); }
.imagine-send-btn:disabled { background: var(--surface3); cursor: not-allowed; }

.imagine-toolbar {

  border-top: 1px solid var(--border);
  overflow-x: auto; flex-wrap: nowrap;
}
.imagine-toolbar::-webkit-scrollbar { display: none; }

.img-tool-btn {

/* imagine results */

════════════════════════════════ */

<script>
// ══════════════════════════════════════════════
//   IlyassAI — Complete JS v4
//   Voice + Imagine + Chat all working
// ══════════════════════════════════════════════

// ── STATE ──
let selectedModel   = 'llama-3.3-70b';
let isGenerating    = false;
let activeTools     = new Set();
let chatHistory     = [];
let currentMode     = 'home'; // home | chat | voice | imagine
let voiceRecognition = null;
let voiceListening  = false;
let imgMode = 'agent';
let imgRatio = '3:2';

// ── INIT ──
document.addEventListener('DOMContentLoaded', () => {
  // chat input
  const ci = document.getElementById('chatInput');
  if (ci) {
    ci.addEventListener('input', () => {
      autoResize(ci);
      document.getElementById('sendBtn').disabled = ci.value.trim() === '';
    });
    ci.addEventListener('keydown', handleKeydown);
  }
  // imagine input
  const ii = document.getElementById('imagineInput');
  if (ii) {
    ii.addEventListener('input', () => {
      autoResize(ii);
      document.getElementById('imagineSendBtn').disabled = ii.value.trim() === '';
    });
  }
  // sidebar history toggle
  document.getElementById('historyToggle')?.addEventListener('click', toggleHistory);
  // close dropdowns on outside click
  document.addEventListener('click', closeDropdownOnOutsideClick);
  // init chat list
  addToChatList('New Chat');
  // populate imagine page
  populateImagineTemplates();
  populateDiscoverGrid();
});

// ── UTILS ──
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 180) + 'px';
}
function autoResizeImagine(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  document.getElementById('imagineSendBtn').disabled = el.value.trim() === '';
}
function scrollToBottom() {
  const ca = document.getElementById('chatArea');
  if (ca) requestAnimationFrame(() => ca.scrollTop = ca.scrollHeight);
}
function escapeHtml(t) {
  return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function showToast(msg, type='') {
  let tc = document.getElementById('__toasts');
  if (!tc) {
    tc = document.createElement('div');
    tc.id = '__toasts';
    tc.style.cssText = 'position:fixed;bottom:90px;left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none;align-items:center';
    document.body.appendChild(tc);
  }
  const t = document.createElement('div');
  const extra = type==='error' ? 'color:#f87171;border-color:rgba(248,113,113,.35)' :
                type==='ok'    ? 'color:#4ade80;border-color:rgba(74,222,128,.3)'   : '';
  t.style.cssText = `background:#111;border:1px solid rgba(255,255,255,0.12);border-radius:999px;padding:9px 18px;font-size:13px;font-family:Inter,sans-serif;box-shadow:0 8px 24px rgba(0,0,0,.5);white-space:nowrap;${extra}`;
  t.textContent = msg;
  tc.appendChild(t);
  setTimeout(() => t.remove(), 2500);
}

// ══════════════════════════════════════════════
//   MODE SWITCHING
// ══════════════════════════════════════════════
function setMode(mode) {
  currentMode = mode;
  // hide all
  document.getElementById('welcomeState').style.display  = 'none';
  document.getElementById('messagesView').style.display  = 'none';
  document.getElementById('chatInputBar').style.display  = 'none';
  document.getElementById('voicePage').classList.remove('active');
  document.getElementById('imaginePage').classList.remove('active');
  // update sidebar active
  document.querySelectorAll('.sb-nav-item').forEach(i => i.classList.remove('active'));
  // show correct mode
  if (mode === 'home') {
    document.getElementById('welcomeState').style.display = 'flex';
    document.querySelector('.sb-nav-item[data-mode="chat"]').classList.add('active');
  } else if (mode === 'chat') {
    document.getElementById('messagesView').style.display = 'flex';
    document.getElementById('chatInputBar').style.display = 'block';
    document.querySelector('.sb-nav-item[data-mode="chat"]').classList.add('active');
  } else if (mode === 'voice') {
    document.getElementById('voicePage').classList.add('active');
    document.querySelector('.sb-nav-item[data-mode="voice"]').classList.add('active');
    startVoiceMode();
  } else if (mode === 'imagine') {
    document.getElementById('imaginePage').classList.add('active');
    document.querySelector('.sb-nav-item[data-mode="imagine"]').classList.add('active');
  }
}

// ── HOME / CHAT switching ──
function switchToChatMode() {
  setMode('chat');
}
function newChat() {
  chatHistory = [];
  document.getElementById('messagesView').innerHTML = '';
  setMode('home');
  document.getElementById('homeInput').value = '';
  document.getElementById('homeSendBtn').disabled = true;
  addToChatList('New Chat');
}

// ── HOME INPUT ──
function syncHomeInput(el) {
  autoResize(el);
  document.getElementById('homeSendBtn').disabled = el.value.trim() === '';
}
function handleHomeKeydown(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendFromHome(); }
}
function sendFromHome() {
  const v = document.getElementById('homeInput').value.trim();
  if (!v || isGenerating) return;
  setMode('chat');
  document.getElementById('chatInput').value = v;
  document.getElementById('sendBtn').disabled = false;
  sendMessage();
}
function useSuggestion(text) {
  const hi = document.getElementById('homeInput');
  hi.value = text; autoResize(hi);
  document.getElementById('homeSendBtn').disabled = false;
}

// ── CHAT INPUT ──
function handleKeydown(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

// ══════════════════════════════════════════════
//   VOICE MODE
// ══════════════════════════════════════════════
function startVoiceMode() {
  const page = document.getElementById('voicePage');
  page.classList.add('listening');
  document.getElementById('voiceSpeakingText').textContent = 'You may start speaking';
  toggleVoiceListen();
}
function stopVoiceMode() {
  if (voiceRecognition) { try { voiceRecognition.stop(); } catch(e){} voiceRecognition = null; }
  voiceListening = false;
  document.getElementById('voicePage').classList.remove('listening');
  setMode('home');
  showToast('Voice mode stopped');
}
function toggleVoiceListen() {
  if (voiceListening) {
    if (voiceRecognition) { voiceRecognition.stop(); voiceRecognition = null; }
    voiceListening = false;
    document.getElementById('voicePage').classList.remove('listening');
    document.getElementById('voiceSpeakingText').textContent = 'Paused — tap mic to resume';
    document.getElementById('voiceMicBtn').style.background = 'var(--surface2)';
    return;
  }
  if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) {
    showToast('Voice not supported in this browser', 'error'); return;
  }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  voiceRecognition = new SR();
  voiceRecognition.continuous = true;
  voiceRecognition.interimResults = true;
  voiceRecognition.lang = 'en-US';
  voiceListening = true;
  document.getElementById('voicePage').classList.add('listening');
  document.getElementById('voiceSpeakingText').textContent = 'Listening…';
  document.getElementById('voiceMicBtn').style.background = 'rgba(255,107,53,0.2)';

  voiceRecognition.onresult = e => {
    let interim = '', final = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) final += e.results[i][0].transcript;
      else interim += e.results[i][0].transcript;
    }
    const display = final || interim;
    if (display) document.getElementById('voiceCardText').textContent = display;
    if (final) {
      // send to chat
      setMode('chat');
      document.getElementById('chatInput').value = final;
      document.getElementById('sendBtn').disabled = false;
      sendMessage();
      document.getElementById('voiceCardText').textContent = 'How can IlyassAI help?';
    }
  };
  voiceRecognition.onerror = e => {
    if (e.error !== 'aborted') showToast('Voice error: ' + e.error, 'error');
    voiceListening = false;
    document.getElementById('voicePage').classList.remove('listening');
    document.getElementById('voiceSpeakingText').textContent = 'Tap mic to try again';
  };
  voiceRecognition.onend = () => {
    if (voiceListening && currentMode === 'voice') {
      try { voiceRecognition.start(); } catch(e) {}
    }
  };
  voiceRecognition.start();
}

// quick voice (from chat input mic button)
function startVoice() {
  if (currentMode !== 'chat' && currentMode !== 'home') return;
  if (!('webkitSpeechRecognition' in window||'SpeechRecognition' in window)) {
    showToast('Voice not supported','error'); return;
  }
  const SR = window.SpeechRecognition||window.webkitSpeechRecognition;
  const r = new SR();
  r.lang='en-US'; r.continuous=false; r.interimResults=false;
  showToast('🎤 Listening…');
  r.start();
  r.onresult = e => {
    const t = e.results[0][0].transcript;
    const inHome = currentMode === 'home';
    const inputEl = document.getElementById(inHome ? 'homeInput' : 'chatInput');
    inputEl.value = t; autoResize(inputEl);
    document.getElementById(inHome ? 'homeSendBtn' : 'sendBtn').disabled = false;
    showToast('✅ Got it', 'ok');
  };
  r.onerror = () => showToast('Voice error — try again', 'error');
}

async function generateImage() {
  const input = document.getElementById('imagineInput');
  const prompt = input.value.trim();
  if (!prompt || isGenerating) return;
  input.value = '';
  autoResize(input);
  document.getElementById('imagineSendBtn').disabled = true;
  showToast('🎨 Generating…');

  // Switch to chat mode to show the generated image
  setMode('chat');
  addMessage('user', '🖼️ Imagine: ' + prompt);
  const tid = showTyping();
  isGenerating = true;

  try {
    const res = await fetch('/api/image', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt, ratio: imgRatio, mode: imgMode })
    });
    removeTyping(tid);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    const url = data.url || data.image_url || data.images?.[0]?.url;
    if (url) {
      const row = addMessage('assistant', '');
      const body = row.querySelector('.ai-body-content');
      body.innerHTML = `<img src="${url}" class="gen-image" alt="${escapeHtml(prompt)}" onclick="window.open('${url}','_blank')"/>
        <div style="font-size:13px;color:var(--text2);margin-top:6px">✨ ${escapeHtml(prompt)}</div>`;
    } else {
      // Fallback: use pollinations.ai directly
      const polUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}?width=512&height=512&nologo=1`;
      const row = addMessage('assistant', '');
      const body = row.querySelector('.ai-body-content');
      body.innerHTML = `<img src="${polUrl}" class="gen-image" alt="${escapeHtml(prompt)}" onclick="window.open('${polUrl}','_blank')"/>
        <div style="font-size:13px;color:var(--text2);margin-top:6px">✨ ${escapeHtml(prompt)}</div>`;
    }
    showToast('✅ Image ready!', 'ok');
  } catch(err) {
    removeTyping(tid);
    // Fallback to pollinations.ai
    const polUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(prompt)}?width=512&height=512&nologo=1`;
    const row = addMessage('assistant', '');
    const body = row.querySelector('.ai-body-content');
    body.innerHTML = `<img src="${polUrl}" class="gen-image" alt="${escapeHtml(prompt)}" onclick="window.open('${polUrl}','_blank')"/>
      <div style="font-size:13px;color:var(--text2);margin-top:6px">✨ ${escapeHtml(prompt)}</div>`;
    showToast('✅ Image generated!', 'ok');
  }
  isGenerating = false;
}

//   CHAT / SEND

async function sendMessage() {
  const input = document.getElementById('chatInput');
  const text  = input.value.trim();
  if (!text || isGenerating) return;

  if (currentMode !== 'chat') setMode('chat');

  addMessage('user', text);
  input.value = ''; autoResize(input);
  document.getElementById('sendBtn').disabled = true;
  chatHistory.push({role:'user', content:text});

  const tid = showTyping();
  isGenerating = true;

  try {
    const res = await fetch('/api/chat', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({model:selectedModel, messages:chatHistory, tools:[...activeTools], stream:true})
    });
    removeTyping(tid);
    if (!res.ok) throw new Error('HTTP '+res.status);

    const reader=res.body.getReader(), dec=new TextDecoder();
    let full='';
    const msgEl = addMessage('assistant','');
    const bodyEl = msgEl.querySelector('.ai-body-content');

    while(true){
      const {done,value} = await reader.read(); if(done) break;
      for(const line of dec.decode(value).split('\n')){
        if(!line.startsWith('data: ')) continue;
        const d=line.slice(6); if(d==='[DONE]') break;
        try{
          const delta=JSON.parse(d)?.choices?.[0]?.delta?.content||'';
          if(delta){ full+=delta; bodyEl.innerHTML=renderMarkdown(full); scrollToBottom(); }
        }catch{}
      }
    }
    chatHistory.push({role:'assistant',content:full});
    updateChatTitle(text);

  } catch(err) {
    removeTyping(tid);
    let extra='';
    try{
      const hj=await(await fetch('/api/health')).json();
      if(!hj.summary?.llm_available)
        extra='\n\n**Fix:** Add `GROQ_API_KEY` in [Vercel settings](https://vercel.com/dashboard) — free at [console.groq.com](https://console.groq.com)';
    }catch{}
    addMessage('assistant','⚠️ **Error:** '+err.message+extra);
    showToast(err.message,'error');
  }
  isGenerating=false;
  document.getElementById('sendBtn').disabled=false;
}

// ── ADD MESSAGE ──
function addMessage(role, content) {
  const view = document.getElementById('messagesView');
  const row  = document.createElement('div');
  row.className = 'msg-row '+role;
  if(role==='user'){
    row.innerHTML=`<div class="user-bubble">${escapeHtml(content)}</div>`;
  } else {
    row.innerHTML=`
      <div class="ai-row">
        <div class="ai-avatar-small">
          <svg viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="2.2">
            <circle cx="16" cy="16" r="14"/><line x1="6" y1="26" x2="26" y2="6"/>
          </svg>
        </div>
        <div class="ai-body">
          <div class="ai-body-content">${renderMarkdown(content)}</div>
          <div class="msg-actions">
            <button class="msg-action-btn" onclick="copyAiMsg(this)">📋 Copy</button>
            <button class="msg-action-btn" onclick="retryLast()">🔄 Retry</button>
          </div>
        </div>
      </div>`;
  }
  view.appendChild(row); scrollToBottom(); return row;
}
function showTyping(){
  const view=document.getElementById('messagesView');
  const id='t'+Date.now(); const el=document.createElement('div');
  el.id=id; el.className='msg-row assistant';
  el.innerHTML=`<div class="ai-row"><div class="ai-avatar-small"><svg viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="16" cy="16" r="14"/><line x1="6" y1="26" x2="26" y2="6"/></svg></div><div class="ai-body"><div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div></div>`;
  view.appendChild(el); scrollToBottom(); return id;
}
function removeTyping(id){ document.getElementById(id)?.remove(); }

// ── MARKDOWN ──
function renderMarkdown(text){
  if(!text) return '';
  return text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/```(\w*)\n?([\s\S]*?)```/g,(_,lang,code)=>
      `<div style="background:#0d0d0d;border:1px solid rgba(255,255,255,0.09);border-radius:10px;overflow:hidden;margin:10px 0">
        <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 14px;border-bottom:1px solid rgba(255,255,255,0.07)">
          <span style="font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:rgba(255,255,255,0.28);font-family:Inter,sans-serif">${lang||'code'}</span>
          <button onclick="copyCode(this)" style="font-family:Inter,sans-serif;font-size:12px;background:none;border:none;color:rgba(255,255,255,0.4);cursor:pointer;padding:2px 8px;border-radius:5px" onmouseover="this.style.background='rgba(255,255,255,0.08)'" onmouseout="this.style.background='none'">Copy</button>
        </div>
        <pre style="margin:0;padding:14px;overflow-x:auto;font-size:13px;font-family:'JetBrains Mono',monospace;line-height:1.6;color:#d4d4d4"><code>${code.trim()}</code></pre>
      </div>`)
    .replace(/`([^`]+)`/g,'<code style="background:rgba(255,255,255,0.07);color:#e2b96f;font-family:JetBrains Mono,monospace;font-size:13px;padding:2px 5px;border-radius:4px">$1</code>')
    .replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>')
    .replace(/\*([^*]+)\*/g,'<em style="opacity:.75">$1</em>')
    .replace(/^### (.+)$/gm,'<h3 style="font-size:15px;font-weight:700;margin:16px 0 8px">$1</h3>')
    .replace(/^## (.+)$/gm,'<h2 style="font-size:18px;font-weight:700;margin:20px 0 10px">$1</h2>')
    .replace(/^# (.+)$/gm,'<h1 style="font-size:21px;font-weight:800;margin:22px 0 12px">$1</h1>')
    .replace(/^> (.+)$/gm,'<blockquote style="border-left:3px solid rgba(255,255,255,0.2);padding:6px 14px;margin:10px 0;opacity:.75">$1</blockquote>')
    .replace(/^- (.+)$/gm,'<li style="margin:4px 0 4px 18px;list-style:disc">$1</li>')
    .replace(/^\d+\. (.+)$/gm,'<li style="margin:4px 0 4px 18px;list-style:decimal">$1</li>')
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank" rel="noopener" style="color:#60a5fa;text-decoration:underline">$1</a>')
    .replace(/\n\n/g,'<br/><br/>')
    .replace(/\n/g,'<br/>');
}
function copyCode(btn){
  const code=btn.closest('div').nextElementSibling.querySelector('code').innerText;
  navigator.clipboard.writeText(code).then(()=>{btn.textContent='Copied!';setTimeout(()=>btn.textContent='Copy',1500)});
}
function copyAiMsg(btn){
  const t=btn.closest('.ai-body').querySelector('.ai-body-content').innerText;
  navigator.clipboard.writeText(t).then(()=>{btn.textContent='✅ Copied!';setTimeout(()=>btn.textContent='📋 Copy',1500)});
}
function retryLast(){
  const userMsgs=chatHistory.filter(m=>m.role==='user');
  if(!userMsgs.length) return;
  chatHistory=chatHistory.slice(0,-2);
  document.getElementById('messagesView').lastElementChild?.remove();
  document.getElementById('messagesView').lastElementChild?.remove();
  document.getElementById('chatInput').value=userMsgs[userMsgs.length-1].content;
  document.getElementById('sendBtn').disabled=false;
  sendMessage();
}

// ── CHAT LIST ──
function addToChatList(title){
  const list=document.getElementById('chatList');
  const item=document.createElement('div');
  item.className='chat-item active';
  item.innerHTML=`<span class="chat-item-icon">💬</span><span class="chat-item-text">${escapeHtml(title)}</span>`;
  item.onclick=()=>{ document.querySelectorAll('.chat-item').forEach(c=>c.classList.remove('active')); item.classList.add('active'); };
  document.querySelectorAll('.chat-item').forEach(c=>c.classList.remove('active'));
  list.prepend(item);
}
function updateChatTitle(text){
  const a=document.querySelector('#chatList .chat-item.active .chat-item-text');
  if(a&&a.textContent.trim()==='New Chat') a.textContent=text.slice(0,36)+(text.length>36?'…':'');
}
function toggleHistory(){
  const list=document.getElementById('chatList');
  const arrow=document.querySelector('#historyToggle .sb-section-arrow');
  const hidden=list.style.display==='none';
  list.style.display=hidden?'':'none';
  if(arrow) arrow.innerHTML=hidden?'&#x276F;':'&#x2304;';
}
