<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Payment Successful — IlyassAI</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Inter',-apple-system,sans-serif;background:#080810;color:#e0e0e0;min-height:100vh;display:flex;align-items:center;justify-content:center}
    .card{background:#111118;border:1px solid rgba(108,99,255,.3);border-radius:20px;padding:56px 48px;text-align:center;max-width:480px;width:90%;box-shadow:0 40px 80px rgba(0,0,0,.6)}
    .icon{font-size:64px;margin-bottom:20px;animation:pop .5s ease}
    @keyframes pop{0%{transform:scale(0)}100%{transform:scale(1)}}
    h1{font-size:28px;font-weight:700;margin-bottom:10px;background:linear-gradient(135deg,#6c63ff,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    p{color:#555;font-size:15px;line-height:1.6;margin-bottom:32px}
    .btn{display:inline-block;padding:14px 36px;background:linear-gradient(135deg,#6c63ff,#7c3aed);color:#fff;border-radius:12px;text-decoration:none;font-weight:600;font-size:15px;transition:opacity .2s}
    .btn:hover{opacity:.88}
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🎉</div>
    <h1>Payment Successful!</h1>
    <p>Your credits have been added to your account.<br/>You can now use the API right away.</p>
    <a href="/api-dashboard" class="btn">→ Go to Dashboard</a>
  </div>
  <script>setTimeout(()=>window.location.href='/api-dashboard', 5000);</script>
</body>
</html>
