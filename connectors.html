<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connectors - IlyassAI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    /* ════════════════════════════════════════
       CONNECTORS PAGE SPECIFIC STYLES
    ════════════════════════════════════════ */

    .connectors-view {
      display: flex;
      flex-direction: column;
      height: 100%;
      overflow: hidden;
    }

    .connectors-header {
      padding: 24px;
      border-bottom: 1px solid var(--border);
    }

    .connectors-title {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--text);
    }

    .connectors-subtitle {
      font-size: 14px;
      color: var(--text-dim);
    }

    .connectors-content {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
    }

    .connectors-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
      max-width: 1200px;
    }

    /* ── ADD CONNECTOR CARD ── */
    .add-connector-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 32px 24px;
      background: var(--surface);
      border: 1.5px solid var(--border-md);
      border-radius: var(--r-lg);
      cursor: pointer;
      transition: all var(--transition);
      font-family: inherit;
    }

    .add-connector-card:hover {
      background: var(--surface-2);
      border-color: var(--accent);
      box-shadow: 0 0 12px rgba(255, 107, 53, 0.1);
    }

    .add-icon {
      font-size: 28px;
      color: var(--accent);
      font-weight: 300;
    }

    .add-connector-card span {
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
    }

    /* ── CONNECTOR CARD ── */
    .connector-card {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      transition: all var(--transition);
      cursor: pointer;
      position: relative;
    }

    .connector-card:hover {
      background: var(--surface-2);
      border-color: var(--border-md);
      box-shadow: var(--shadow-sm);
    }

    .connector-card-logo {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--surface-2);
      border-radius: var(--r-md);
      flex-shrink: 0;
      color: var(--text);
    }

    .connector-card-logo svg {
      width: 20px;
      height: 20px;
    }

    .connector-card-info {
      flex: 1;
      min-width: 0;
    }

    .connector-card-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 2px;
    }

    .connector-card-desc {
      font-size: 12px;
      color: var(--text-dim);
      line-height: 1.4;
    }

    .connector-card-arrow {
      width: 14px;
      height: 14px;
      color: var(--text-muted);
      flex-shrink: 0;
      transition: transform var(--transition);
    }

    .connector-card:hover .connector-card-arrow {
      transform: translateX(4px);
      color: var(--accent);
    }

    .connector-card-status {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 8px;
      height: 8px;
      background: var(--green);
      border-radius: 50%;
      box-shadow: 0 0 8px rgba(74, 222, 128, 0.4);
    }

    /* ════════════════════════════════════════
       CONNECTOR POPUP
    ════════════════════════════════════════ */

    .connector-popup-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(4px);
      z-index: 100;
      animation: fadeIn 0.2s ease-out;
    }

    .connector-popup-overlay.active {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    @keyframes slideUp {
      from {
        transform: translateY(20px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    .connector-popup {
      background: var(--surface);
      border: 1px solid var(--border-md);
      border-radius: var(--r-xl);
      padding: 32px;
      width: 90%;
      max-width: 500px;
      text-align: center;
      animation: slideUp 0.3s ease-out;
      box-shadow: var(--shadow-lg);
    }

    .connector-popup-close {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: none;
      color: var(--text-dim);
      cursor: pointer;
      border-radius: var(--r-md);
      transition: all var(--transition);
      font-family: inherit;
    }

    .connector-popup-close:hover {
      background: var(--surface-2);
      color: var(--text);
    }

    .connector-popup-close svg {
      width: 18px;
      height: 18px;
    }

    .connector-popup-icon {
      width: 64px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--surface-2);
      border-radius: var(--r-lg);
      margin: 0 auto 20px;
    }

    .connector-popup-icon svg {
      width: 32px;
      height: 32px;
      color: var(--text);
    }

    .connector-popup-title {
      font-size: 20px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 8px;
    }

    .connector-popup-desc {
      font-size: 14px;
      color: var(--text-dim);
      margin-bottom: 24px;
      line-height: 1.6;
    }

    .connector-popup-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 24px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: var(--r-md);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--transition);
      font-family: inherit;
    }

    .connector-popup-button:hover {
      background: #ff5a1f;
      box-shadow: var(--shadow-glow);
      transform: translateY(-2px);
    }

    .connector-popup-button svg {
      width: 16px;
      height: 16px;
    }

    .connector-popup-details {
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      text-align: left;
    }

    .connector-popup-details-toggle {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      color: var(--text-dim);
      font-size: 12px;
      cursor: pointer;
      background: none;
      border: none;
      font-family: inherit;
      transition: color var(--transition);
    }

    .connector-popup-details-toggle:hover {
      color: var(--text);
    }

    .connector-popup-details-toggle svg {
      width: 12px;
      height: 12px;
      transition: transform var(--transition);
    }

    .connector-popup-details-toggle.expanded svg {
      transform: rotate(180deg);
    }

    .connector-popup-details-content {
      display: none;
      margin-top: 12px;
      font-size: 12px;
      color: var(--text-dim);
      line-height: 1.6;
    }

    .connector-popup-details-content.show {
      display: block;
    }

    /* ════════════════════════════════════════
       RESPONSIVE
    ════════════════════════════════════════ */

    @media (max-width: 768px) {
      .connectors-grid {
        grid-template-columns: 1fr;
      }

      .connector-popup {
        width: 95%;
        padding: 24px;
      }

      .connectors-header {
        padding: 16px;
      }

      .connectors-content {
        padding: 16px;
      }
    }
  </style>
</head>
<body>

<!-- ════════════════════════════════════════
     SIDEBAR
════════════════════════════════════════ -->
<aside class="sidebar" id="sidebar">

  <div class="sidebar-header">
    <button class="sidebar-logo-btn" onclick="goHome()" title="Home">
      <svg viewBox="0 0 32 32" fill="currentColor" width="26" height="26">
        <path d="M16 2C8.268 2 2 8.268 2 16s6.268 14 14 14 14-6.268 14-14S23.732 2 16 2zm0 3.5c2.006 0 3.89.524 5.522 1.44L7.94 21.522A10.45 10.45 0 0 1 5.5 16C5.5 9.649 10.649 4.5 17 4.5h-1zm0 21c-2.006 0-3.89-.524-5.522-1.44L24.06 10.478A10.45 10.45 0 0 1 26.5 16c0 6.351-5.149 11.5-11.5 11.5h1z"/>
      </svg>
    </button>

    <div style="display:flex;align-items:center;gap:4px;">
      <button class="sidebar-collapse-btn" onclick="toggleSidebarCollapse()" title="Collapse sidebar" id="collapseBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <line x1="9" y1="3" x2="9" y2="21"/>
        </svg>
      </button>
      <button class="new-chat-btn" onclick="newChat()" title="New chat">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="17" height="17">
          <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
          <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
        </svg>
      </button>
    </div>
  </div>

  <div class="sidebar-search">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" placeholder="Search conversations" id="convSearch" oninput="filterConvs(this.value)" />
  </div>

  <div class="sidebar-conversations" id="conversationsList">
    <div class="no-conversations">No conversations yet</div>
  </div>

  <div class="sidebar-footer">
    <button class="sidebar-footer-btn" onclick="openSettings()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" width="15" height="15"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      <span>Settings</span>
    </button>
    <div class="user-row" id="userRow">
      <div class="user-avatar" id="userAvatar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </div>
      <span class="user-name" id="sidebarUserName">Guest</span>
      <button class="signin-link" id="signInBtn" onclick="showAuthModal('login')">Sign in</button>
    </div>
  </div>
</aside>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

<!-- ════════════════════════════════════════
     MAIN
════════════════════════════════════════ -->
<main class="main" id="main">

  <button class="mobile-menu-btn" id="mobileMenuBtn" onclick="toggleSidebar()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
  </button>

  <!-- CONNECTORS VIEW -->
  <div class="connectors-view" id="connectorsView">
    <div class="connectors-header">
      <h1 class="connectors-title">Connectors</h1>
      <p class="connectors-subtitle">Connect your favorite apps and services to enhance your AI experience</p>
    </div>

    <div class="connectors-content">
      <div class="connectors-grid" id="connectorsGrid">
        <!-- Connectors will be rendered here -->
      </div>
    </div>
  </div>

</main>

<!-- ════════════════════════════════════════
     CONNECTOR POPUP
════════════════════════════════════════ -->
<div class="connector-popup-overlay" id="connectorPopupOverlay" onclick="closeConnectorPopup(event)">
  <div class="connector-popup" id="connectorPopup" onclick="event.stopPropagation()">
    <button class="connector-popup-close" onclick="closeConnectorPopup()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <div class="connector-popup-icon" id="connectorPopupIcon"></div>
    <h2 class="connector-popup-title" id="connectorPopupTitle">GitHub</h2>
    <p class="connector-popup-desc" id="connectorPopupDesc">Connect your GitHub account to manage repositories and automate workflows.</p>
    <button class="connector-popup-button" id="connectorPopupButton" onclick="connectPlatform()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      <span id="connectorPopupButtonText">Connect</span>
    </button>
    <div class="connector-popup-details">
      <button class="connector-popup-details-toggle" id="detailsToggle" onclick="toggleDetails()">
        <span>Show Details</span>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
      </button>
      <div class="connector-popup-details-content" id="detailsContent">
        <p id="connectorPopupDetails"></p>
      </div>
    </div>
  </div>
</div>

<!-- TOAST CONTAINER -->
<div id="toastContainer" class="toast-container"></div>

<!-- ════════════════════════════════════════
     SCRIPTS
════════════════════════════════════════ -->
<script src="firebase.js" type="module"></script>
<script src="ControleAi.js"></script>
<script>
// ════════════════════════════════════════
// CONNECTORS PAGE LOGIC
// ════════════════════════════════════════

const CONNECTORS_DATA = {
  github: {
    name: 'GitHub',
    desc: 'Access, search, and organize repos, track issues, review pull requests, and automate workflows directly in Manus.',
    details: 'Connect your GitHub account to access repositories, manage issues, and automate your development workflow.',
    svg: '<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.042-1.416-4.042-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>'
  },
  gmail: {
    name: 'Gmail',
    desc: 'Access and manage your emails, search conversations, and integrate email workflows into your AI tasks.',
    details: 'Connect your Gmail account to read, send, and manage emails directly from your AI interface.',
    svg: '<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M24 5.457v13.909c0 .904-.732 1.636-1.636 1.636h-3.819V11.73L12 16.64l-6.545-4.91v9.273H1.636A1.636 1.636 0 0 1 0 19.366V5.457c0-2.023 2.309-3.178 3.927-1.964L12 9.573l8.073-6.08c1.618-1.214 3.927-.059 3.927 1.964z"/></svg>'
  },
  calendar: {
    name: 'Google Calendar',
    desc: 'Manage your schedule and events, check availability, and schedule meetings with your AI assistant.',
    details: 'Connect your Google Calendar to view events, create meetings, and manage your schedule seamlessly.',
    svg: '<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="4" width="18" height="18" rx="2" fill="none" stroke="currentColor" stroke-width="2"/><line x1="16" y1="2" x2="16" y2="6" stroke="currentColor" stroke-width="2"/><line x1="8" y1="2" x2="8" y2="6" stroke="currentColor" stroke-width="2"/><line x1="3" y1="10" x2="21" y2="10" stroke="currentColor" stroke-width="2"/></svg>'
  },
  slack: {
    name: 'Slack',
    desc: 'Send messages, manage channels, and integrate Slack notifications into your AI workflows.',
    details: 'Connect your Slack workspace to send messages, read conversations, and automate notifications.',
    svg: '<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M5.042 15.165a2.528 2.528 0 0 1-2.52 2.523A2.528 2.528 0 0 1 0 15.165a2.527 2.527 0 0 1 2.522-2.52h2.52v2.52zM6.313 15.165a2.527 2.527 0 0 1 2.521-2.52 2.528 2.528 0 0 1 2.523 2.52v6.312A2.528 2.528 0 0 1 8.834 24a2.528 2.528 0 0 1-2.521-2.523v-6.312zM8.834 5.042a2.528 2.528 0 0 1-2.521-2.52A2.528 2.528 0 0 1 8.834 0a2.528 2.528 0 0 1 2.523 2.522v2.52H8.834zM8.834 6.313a2.528 2.528 0 0 1 2.523 2.521 2.527 2.527 0 0 1-2.523 2.521H2.522A2.527 2.527 0 0 1 0 8.834a2.528 2.528 0 0 1 2.522-2.521h6.312zM18.956 8.834a2.528 2.528 0 0 1 2.52-2.521A2.528 2.528 0 0 1 24 8.834a2.527 2.527 0 0 1-2.522 2.521h-2.52V8.834zM17.686 8.834a2.527 2.527 0 0 1-2.521-2.521 2.528 2.528 0 0 1 2.521-2.521h6.312A2.528 2.528 0 0 1 24 6.313a2.528 2.528 0 0 1-2.523 2.521h-6.312zM15.165 18.956a2.528 2.528 0 0 1 2.521 2.52A2.528 2.528 0 0 1 15.165 24a2.527 2.527 0 0 1-2.521-2.522v-2.52h2.521zM15.165 17.686a2.527 2.527 0 0 1-2.521-2.523 2.528 2.528 0 0 1 2.521-2.521h6.312a2.528 2.528 0 0 1 2.523 2.521 2.528 2.528 0 0 1-2.523 2.523h-6.312z"/></svg>'
  },
  notion: {
    name: 'Notion',
    desc: 'Access your Notion databases, create pages, and manage your knowledge base with AI assistance.',
    details: 'Connect your Notion workspace to read and create pages, manage databases, and organize information.',
    svg: '<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M4.459 4.208c.746.944 1.108 1.89 1.108 4.272v12.02c0 .904-.255 1.712-.684 2.04-.429.328-.887.04-1.562-.585L2.6 20.584c-.312-.304-.546-.683-.546-1.088V7.91c0-1.31.584-2.716 1.405-3.702zM21.3 5.684c0-.904-.255-1.712-.684-2.04-.429-.328-.887-.04-1.562.585l-1.321 1.136c-.312.304-.546.683-.546 1.088v12.604c0 1.31.584 2.716 1.405 3.702.746.944 1.108 1.89 1.108 4.272v-12.02c0-.904.255-1.712.684-2.04.429-.328.887-.04 1.562.585l1.321-1.136c.312-.304.546-.683.546-1.088V5.684z"/></svg>'
  },
  twitter: {
    name: 'Twitter',
    desc: 'Post tweets, read your feed, and manage your Twitter presence directly from your AI assistant.',
    details: 'Connect your Twitter account to post tweets, read your timeline, and manage your social presence.',
    svg: '<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M23 3a10.9 10.9 0 01-3.14 1.53 4.48 4.48 0 00-7.86 3v1A10.66 10.66 0 013 4s-4 9 5 13a11.64 11.64 0 01-7 2s9 5 20 5a9.5 9.5 0 00-9-5.5c4.75 2.25 7-7 7-7s1.1 5.2-5.1 8.3a9.5 9.5 0 01-14-9" stroke="currentColor" stroke-width="2" fill="none"/></svg>'
  }
};

let _connectedPlatforms = ['github', 'gmail'];
let _currentConnector = null;

function renderConnectors() {
  const grid = document.getElementById('connectorsGrid');
  if (!grid) return;
  grid.innerHTML = '';

  // Add connector card
  const addCard = document.createElement('button');
  addCard.className = 'add-connector-card';
  addCard.onclick = () => showConnectorPicker();
  addCard.innerHTML = `
    <div class="add-icon">+</div>
    <span>Add connectors</span>
  `;
  grid.appendChild(addCard);

  // Connected connectors
  _connectedPlatforms.forEach(platform => {
    const data = CONNECTORS_DATA[platform];
    if (!data) return;

    const card = document.createElement('button');
    card.className = 'connector-card';
    card.onclick = () => showConnectorPopup(platform);
    card.innerHTML = `
      <div class="connector-card-logo">${data.svg}</div>
      <div class="connector-card-info">
        <div class="connector-card-name">${data.name}</div>
        <div class="connector-card-desc">${data.desc}</div>
      </div>
      <svg class="connector-card-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
      <div class="connector-card-status"></div>
    `;
    grid.appendChild(card);
  });
}

function showConnectorPicker() {
  // Create a modal for selecting which connector to add
  const availablePlatforms = Object.keys(CONNECTORS_DATA).filter(p => !_connectedPlatforms.includes(p));
  
  if (availablePlatforms.length === 0) {
    showToast('All connectors are already connected!');
    return;
  }

  // Show the first available connector as example
  showConnectorPopup(availablePlatforms[0]);
}

function showConnectorPopup(platform) {
  const data = CONNECTORS_DATA[platform];
  if (!data) return;

  _currentConnector = platform;

  const popup = document.getElementById('connectorPopup');
  const overlay = document.getElementById('connectorPopupOverlay');

  document.getElementById('connectorPopupIcon').innerHTML = data.svg;
  document.getElementById('connectorPopupTitle').textContent = data.name;
  document.getElementById('connectorPopupDesc').textContent = data.desc;
  document.getElementById('connectorPopupDetails').textContent = data.details;

  const isConnected = _connectedPlatforms.includes(platform);
  const button = document.getElementById('connectorPopupButton');
  const buttonText = document.getElementById('connectorPopupButtonText');

  if (isConnected) {
    button.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg><span>Connected</span>';
    button.disabled = true;
    button.style.opacity = '0.6';
    button.style.cursor = 'default';
    button.onclick = null;
  } else {
    button.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg><span>Connect</span>';
    button.disabled = false;
    button.style.opacity = '1';
    button.style.cursor = 'pointer';
    button.onclick = () => connectPlatform();
  }

  overlay.classList.add('active');
}

function closeConnectorPopup(event) {
  if (event && event.target !== document.getElementById('connectorPopupOverlay')) return;
  document.getElementById('connectorPopupOverlay').classList.remove('active');
  _currentConnector = null;
}

function connectPlatform() {
  if (!_currentConnector) return;

  // Add to connected platforms
  if (!_connectedPlatforms.includes(_currentConnector)) {
    _connectedPlatforms.push(_currentConnector);
  }

  const name = CONNECTORS_DATA[_currentConnector].name;
  showToast(`✅ ${name} connected successfully!`);

  // Update UI
  renderConnectors();
  
  // Close popup after a short delay
  setTimeout(() => {
    closeConnectorPopup();
  }, 500);
}

function toggleDetails() {
  const toggle = document.getElementById('detailsToggle');
  const content = document.getElementById('detailsContent');
  toggle.classList.toggle('expanded');
  content.classList.toggle('show');
}

// Toast notification
function showToast(message) {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.textContent = message;
  toast.style.cssText = `
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: var(--surface-2);
    color: var(--text);
    padding: 12px 16px;
    border-radius: 8px;
    border: 1px solid var(--border);
    font-size: 13px;
    z-index: 1000;
    animation: slideUp 0.3s ease-out;
  `;
  container.appendChild(toast);
  setTimeout(() => toast.remove(), 3000);
}
