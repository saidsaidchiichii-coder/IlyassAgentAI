name: Groq AI Automation Engine

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: 'Prompt for Groq'
        required: true
        type: string
      file_path:
        description: 'Target File Path'
        required: true
        type: string
      action_type:
        description: 'Action Type'
        required: true
        type: choice
        options:
          - create
          - update
          - delete

jobs:
  execute_task:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write # Required for git-auto-commit-action to create PRs if needed

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Groq library
        run: pip install groq

      - name: Process with Groq
        id: process
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PROMPT: ${{ github.event.inputs.prompt }}
          FILE_PATH: ${{ github.event.inputs.file_path }}
          ACTION_TYPE: ${{ github.event.inputs.action_type }}
        shell: python
        run: |
          import os
          from groq import Groq

          GROQ_API_KEY = os.environ.get("GROQ_API_KEY")
          PROMPT = os.environ.get("PROMPT")
          FILE_PATH = os.environ.get("FILE_PATH")
          ACTION_TYPE = os.environ.get("ACTION_TYPE")

          client = Groq(api_key=GROQ_API_KEY)

          file_changed = False
          output_content = ""

          if ACTION_TYPE == "create" or ACTION_TYPE == "update":
              print(f"Generating content for {FILE_PATH} with prompt: {PROMPT}")
              try:
                  chat_completion = client.chat.completions.create(
                      messages=[
                          {
                              "role": "user",
                              "content": PROMPT,
                          }
                      ],
                      model="llama3-8b-8192", # يمكنك اختيار نماذج أخرى مثل "mixtral-8x7b-32768" أو "llama3-70b-8192"
                  )
                  output_content = chat_completion.choices[0].message.content
                  print("Content generated successfully.")
              except Exception as e:
                  print(f"Error generating content from Groq: {e}")
                  output_content = f"Error: Could not generate content. {e}"

              if ACTION_TYPE == "create":
                  try:
                      with open(FILE_PATH, "w") as f:
                          f.write(output_content)
                      file_changed = True
                      print(f"File {FILE_PATH} created/overwritten successfully.")
                  except Exception as e:
                      print(f"Error creating file {FILE_PATH}: {e}")
                      file_changed = False
              elif ACTION_TYPE == "update":
                  try:
                      with open(FILE_PATH, "w") as f:
                          f.write(output_content)
                      file_changed = True
                      print(f"File {FILE_PATH} updated successfully.")
                  except FileNotFoundError:
                      print(f"Error: File {FILE_PATH} not found for update.")
                      file_changed = False
                  except Exception as e:
                      print(f"Error updating file {FILE_PATH}: {e}")
                      file_changed = False
          elif ACTION_TYPE == "delete":
              print(f"Attempting to delete file: {FILE_PATH}")
              try:
                  os.remove(FILE_PATH)
                  file_changed = True
                  print(f"File {FILE_PATH} deleted successfully.")
              except FileNotFoundError:
                  print(f"Error: File {FILE_PATH} not found for deletion.")
                  file_changed = False
              except Exception as e:
                  print(f"Error deleting file {FILE_PATH}: {e}")
                  file_changed = False

          # تصدير المتغير file_changed إلى بيئة GitHub Actions
          with open(os.environ['GITHUB_OUTPUT'], 'a') as fh:
              print(f'file_changed={str(file_changed).lower()}', file=fh)

      - name: Commit Changes
        if: steps.process.outputs.file_changed == 'true'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "AI Update: ${{ github.event.inputs.file_path }} (Action: ${{ github.event.inputs.action_type }})"
          branch: main # تأكد من استخدام اسم الفرع الافتراضي لمستودعك (عادةً main أو master)
          # يمكنك إضافة author_name و author_email إذا كنت تريد تخصيص معلومات الـ commit
          # author_name: 'Groq AI Bot'
          # author_email: 'groq-ai-bot@example.com'
