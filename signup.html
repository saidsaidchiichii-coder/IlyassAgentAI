<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - Grok</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="login-design.css">
    
    <style>
        body {
            background: linear-gradient(-45deg, #000000, #0a0a0a, #050505, #000000);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #e7e9ea;
            margin: 0;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .signup-container {
            width: 380px;
            padding: 40px 32px;
            background: #000000;
            border: 1px solid #2f3336;
            border-radius: 20px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.85);
            text-align: center;
        }

        .grok-logo {
            width: 48px;
            height: 48px;
            margin: 0 auto 20px;
            fill: #1d9bf0;
        }

        h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
        .subtitle { color: #71767b; margin-bottom: 30px; font-size: 15px; }

        .input-field {
            width: 100%;
            padding: 14px 16px;
            margin: 10px 0;
            background: #16181c;
            border: 1px solid #2f3336;
            border-radius: 10px;
            color: white;
            font-size: 15px;
            outline: none;
        }

        .input-field:focus {
            border-color: #1d9bf0;
            box-shadow: 0 0 0 3px rgba(29, 155, 240, 0.25);
        }

        .signup-btn {
            width: 100%;
            padding: 14px;
            margin-top: 20px;
            background: #1d9bf0;
            color: #000;
            border: none;
            border-radius: 9999px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="signup-container">
        <svg class="grok-logo" viewBox="0 0 24 24" fill="currentColor">
            <circle cx="12" cy="12" r="10"></circle>
            <line x1="14.31" y1="8" x2="20.05" y2="17.94"></line>
            <line x1="9.69" y1="8" x2="21.17" y2="8"></line>
            <line x1="7.38" y1="12" x2="13.12" y2="2.06"></line>
            <line x1="9.69" y1="16" x2="3.95" y2="6.06"></line>
            <line x1="14.31" y1="16" x2="2.83" y2="16"></line>
            <line x1="16.62" y1="12" x2="10.88" y2="21.94"></line>
        </svg>

        <h1>Create Account</h1>
        <p class="subtitle">Join Grok</p>

        <input type="text" id="fullName" class="input-field" placeholder="Full name">
        <input type="email" id="authEmail" class="input-field" placeholder="Email address">
        <input type="password" id="authPassword" class="input-field" placeholder="Password">

        <button id="authSubmit" class="signup-btn">Create Account</button>

        <p class="switch-text" onclick="window.location.href='login.html'">
            Already have an account? <strong>Sign in</strong>
        </p>
    </div>

    <!-- Firebase Script - بدون type="module" داخل الصفحة -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

    <script>
        // Firebase Config
        const firebaseConfig = {
          apiKey: "AIzaSyDWch9gK12sGD7awxmRibU6jBspd-tjr6E",
          authDomain: "my-website-17f99.firebaseapp.com",
          projectId: "my-website-17f99",
          storageBucket: "my-website-17f99.firebasestorage.app",
          messagingSenderId: "799668604107",
          appId: "1:799668604107:web:adc03ea5fd66c58af09f4e",
          measurementId: "G-H1SLRSEBTF"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        function showMsg(text, isError = false) {
          const box = document.createElement("div");
          box.innerText = text;
          box.style.position = "fixed";
          box.style.bottom = "20px";
          box.style.right = "20px";
          box.style.background = isError ? "#c42b1c" : "#111";
          box.style.color = "white";
          box.style.padding = "14px 18px";
          box.style.borderRadius = "12px";
          box.style.boxShadow = "0 10px 35px rgba(0,0,0,0.7)";
          box.style.zIndex = "99999";
          box.style.opacity = "0";
          box.style.transform = "translateY(20px)";
          box.style.transition = "all 0.3s ease";
          document.body.appendChild(box);

          setTimeout(() => {
            box.style.opacity = "1";
            box.style.transform = "translateY(0)";
          }, 10);

          setTimeout(() => {
            box.style.opacity = "0";
            box.style.transform = "translateY(20px)";
            setTimeout(() => box.remove(), 400);
          }, 3200);
        }

        // ربط الزر
        document.getElementById("authSubmit").addEventListener("click", async () => {
          const email = document.getElementById("authEmail").value.trim();
          const password = document.getElementById("authPassword").value.trim();

          if (!email || !password) {
            showMsg("❌ يرجى ملء الإيميل وكلمة المرور", true);
            return;
          }

          const btn = document.getElementById("authSubmit");
          btn.disabled = true;
          btn.textContent = "جاري إنشاء الحساب...";

          try {
            await auth.createUserWithEmailAndPassword(email, password);
            showMsg("✅ تم إنشاء الحساب بنجاح!", false);
            
            setTimeout(() => {
              window.location.href = "login.html";
            }, 1500);

          } catch (error) {
            console.error(error);
            showMsg("❌ " + error.message, true);
          } finally {
            btn.disabled = false;
            btn.textContent = "Create Account";
          }
        });
    </script>

</body>
</html>
