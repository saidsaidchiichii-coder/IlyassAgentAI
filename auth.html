<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IlyassAI — Sign In</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <style>
    :root {
      --bg: #000000;
      --text: #ffffff;
      --text-dim: #71717a;
      --border: rgba(255, 255, 255, 0.1);
      --accent: #ffffff;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
    body, html { width: 100%; height: 100%; background: #000; color: #fff; overflow: hidden; }
    .split-layout { display: flex; width: 100%; height: 100vh; }
    .form-side { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 60px; background: #000; z-index: 10; }
    .form-content { width: 100%; max-width: 380px; }
    .logo-box { margin-bottom: 40px; }
    h1 { font-size: 32px; font-weight: 700; margin-bottom: 8px; letter-spacing: -1px; }
    p.subtitle { color: var(--text-dim); font-size: 15px; margin-bottom: 40px; }
    .social-btns { display: flex; flex-direction: column; gap: 12px; margin-bottom: 24px; }
    .btn { width: 100%; height: 48px; border-radius: 24px; display: flex; align-items: center; justify-content: center; gap: 12px; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s; border: 1px solid var(--border); background: transparent; color: #fff; }
    .btn-white { background: #fff; color: #000; border: none; }
    .btn-white:hover { background: #e4e4e7; }
    .btn:not(.btn-white):hover { background: rgba(255,255,255,0.05); }
    .divider { display: flex; align-items: center; margin: 24px 0; color: var(--text-dim); font-size: 13px; }
    .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: var(--border); }
    .divider span { padding: 0 16px; }
    .input-group { margin-bottom: 16px; }
    input { width: 100%; height: 48px; background: #000; border: 1px solid var(--border); border-radius: 8px; padding: 0 16px; color: #fff; font-size: 15px; outline: none; }
    input:focus { border-color: #fff; }
    .btn-primary { margin-top: 10px; background: #fff; color: #000; border: none; width: 100%; height: 48px; border-radius: 24px; font-weight: 700; cursor: pointer; }
    .footer-text { margin-top: 32px; text-align: center; font-size: 14px; color: var(--text-dim); }
    .footer-text a { color: #fff; text-decoration: none; font-weight: 600; }
    .error-box { color: #ff4d4d; font-size: 13px; margin-top: 12px; text-align: center; display: none; padding: 10px; background: rgba(255,77,77,0.1); border-radius: 8px; }
    .visual-side { flex: 1.2; position: relative; background: #000; border-left: 1px solid var(--border); display: flex; align-items: center; justify-content: center; overflow: hidden; }
    #particles-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
    .visual-logo { position: relative; z-index: 5; width: 280px; height: 280px; opacity: 0.9; filter: drop-shadow(0 0 40px rgba(255,255,255,0.15)); }
    @media (max-width: 1024px) { .visual-side { display: none; } }
  </style>
</head>
<body>
  <div class="split-layout">
    <div class="form-side">
      <div class="form-content">
        <div class="logo-box">
          <svg viewBox="0 0 32 32" fill="white" width="40" height="40">
            <path d="M16 2C8.268 2 2 8.268 2 16s6.268 14 14 14 14-6.268 14-14S23.732 2 16 2zm0 3.5c2.006 0 3.89.524 5.522 1.44L7.94 21.522A10.45 10.45 0 0 1 5.5 16C5.5 9.649 10.649 4.5 17 4.5h-1zm0 21c-2.006 0-3.89-.524-5.522-1.44L24.06 10.478A10.45 10.45 0 0 1 26.5 16c0 6.351-5.149 11.5-11.5 11.5h1z"/>
          </svg>
        </div>
        <h1 id="title">Join IlyassAI</h1>
        <p class="subtitle" id="subtitle">The most advanced AI agent platform.</p>
        <div class="social-btns">
          <button class="btn btn-white" onclick="googleLogin()">
            <svg width="20" height="20" viewBox="0 0 24 24">
              <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
              <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
              <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
              <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            Sign up with Google
          </button>
          <button class="btn" onclick="continueAsGuest()">Continue as Guest</button>
        </div>
        <div class="divider"><span>or</span></div>
        <div class="input-group"><input type="email" id="email" placeholder="Email address"></div>
        <div class="input-group"><input type="password" id="password" placeholder="Password"></div>
        <button class="btn-primary" id="submitBtn" onclick="handleSubmit()">Create account</button>
        <div class="error-box" id="errorBox"></div>
        <div class="footer-text">
          <span id="toggleText">Already have an account?</span>
          <a href="#" id="toggleBtn" onclick="toggleMode()">Sign in</a>
        </div>
      </div>
    </div>
    <div class="visual-side">
      <canvas id="particles-canvas"></canvas>
      <div class="visual-logo">
        <svg viewBox="0 0 32 32" fill="white" width="100%" height="100%">
          <path d="M16 2C8.268 2 2 8.268 2 16s6.268 14 14 14 14-6.268 14-14S23.732 2 16 2zm0 3.5c2.006 0 3.89.524 5.522 1.44L7.94 21.522A10.45 10.45 0 0 1 5.5 16C5.5 9.649 10.649 4.5 17 4.5h-1zm0 21c-2.006 0-3.89-.524-5.522-1.44L24.06 10.478A10.45 10.45 0 0 1 26.5 16c0 6.351-5.149 11.5-11.5 11.5h1z"/>
        </svg>
      </div>
    </div>
  </div>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, signInWithRedirect, signInWithEmailAndPassword, createUserWithEmailAndPassword, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    const firebaseConfig = {
      apiKey: "AIzaSyDWch9gK12sGD7awxmRibU6jBspd-tjr6E",
      authDomain: "ilyassagentai.firebaseapp.com",
      projectId: "ilyassagentai",
      storageBucket: "ilyassagentai.firebasestorage.app",
      messagingSenderId: "1070041614552",
      appId: "1:1070041614552:web:your-app-id"
    };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const googleProvider = new GoogleAuthProvider();
    let mode = 'signup';
    window.toggleMode = () => {
      mode = mode === 'signup' ? 'login' : 'signup';
      document.getElementById('title').innerText = mode === 'signup' ? 'Join IlyassAI' : 'Sign in to IlyassAI';
      document.getElementById('submitBtn').innerText = mode === 'signup' ? 'Create account' : 'Sign in';
      document.getElementById('toggleText').innerText = mode === 'signup' ? 'Already have an account?' : "Don't have an account?";
      document.getElementById('toggleBtn').innerText = mode === 'signup' ? 'Sign in' : 'Sign up';
    };
    window.googleLogin = async () => {
      try {
        await signInWithPopup(auth, googleProvider);
        window.location.href = '/app';
      } catch (error) {
        if(error.code === "auth/unauthorized-domain") {
          await signInWithRedirect(auth, googleProvider);
        } else {
          showError(error.message);
        }
      }
    };
    window.continueAsGuest = async () => {
      try {
        await signInAnonymously(auth);
        window.location.href = '/app';
      } catch (error) {
        showError(error.message);
      }
    };
    window.handleSubmit = async () => {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const btn = document.getElementById('submitBtn');
      if (!email || !password) return showError("Please fill in all fields");
      btn.disabled = true; btn.innerText = "Loading...";
      try {
        if (mode === 'signup') { await createUserWithEmailAndPassword(auth, email, password); }
        else { await signInWithEmailAndPassword(auth, email, password); }
        window.location.href = '/app';
      } catch (error) {
        showError(error.message);
        btn.disabled = false;
        btn.innerText = mode === 'signup' ? 'Create account' : 'Sign in';
      }
    };
    function showError(msg) {
      const box = document.getElementById('errorBox');
      box.innerText = msg; box.style.display = 'block';
    }
    onAuthStateChanged(auth, (user) => {
      if (user && !user.isAnonymous) { window.location.href = '/app'; }
    });
    class ParticleSystem {
      constructor() {
        this.canvas = document.getElementById('particles-canvas');
        this.scene = new THREE.Scene();
        this.camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        this.renderer = new THREE.WebGLRenderer({ canvas: this.canvas, alpha: true, antialias: true });
        this.renderer.setSize(window.innerWidth, window.innerHeight);
        this.camera.position.z = 5;
        this.init(); this.animate();
        window.addEventListener('resize', () => this.onResize());
      }
      init() {
        const geometry = new THREE.BufferGeometry();
        const vertices = [];
        for (let i = 0; i < 2000; i++) {
          vertices.push(THREE.MathUtils.randFloatSpread(20));
          vertices.push(THREE.MathUtils.randFloatSpread(20));
          vertices.push(THREE.MathUtils.randFloatSpread(20));
        }
        geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
        const material = new THREE.PointsMaterial({ color: 0xffffff, size: 0.02, transparent: true, opacity: 0.5 });
        this.points = new THREE.Points(geometry, material);
        this.scene.add(this.points);
      }
      onResize() {
        this.camera.aspect = window.innerWidth / window.innerHeight;
        this.camera.updateProjectionMatrix();
        this.renderer.setSize(window.innerWidth, window.innerHeight);
      }
      animate() {
        requestAnimationFrame(() => this.animate());
        this.points.rotation.y += 0.001;
        this.points.rotation.x += 0.0005;
        this.renderer.render(this.scene, this.camera);
      }
    }
    new ParticleSystem();
  </script>
</body>
</html>
