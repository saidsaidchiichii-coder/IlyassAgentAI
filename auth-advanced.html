<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>IlyassAI — Sign In</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --surface-2: #1a1a1a;
      --surface-3: #222222;
      --border: rgba(255,255,255,0.08);
      --border-md: rgba(255,255,255,0.13);
      --text: #ececec;
      --text-dim: #8a8f98;
      --text-muted: #444;
      --accent: #ff6b35;
      --accent-dim: rgba(255,107,53,0.12);
      --accent-light: rgba(255,107,53,0.25);
      --red: #f87171;
      --green: #4ade80;
      --blue: #60a5fa;
      --r-md: 10px;
      --r-lg: 14px;
      --r-xl: 20px;
      --r-full: 9999px;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
    }

    /* Canvas for particles */
    #particles-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      pointer-events: none;
    }

    /* Background glow */
    .bg-glow {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      background: radial-gradient(ellipse 80% 50% at 50% 0%, rgba(255,107,53,0.1) 0%, transparent 70%);
    }

    /* Center layout */
    .auth-page {
      position: relative;
      z-index: 2;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .auth-card {
      width: 100%;
      max-width: 480px;
      background: rgba(17, 17, 17, 0.95);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border-md);
      border-radius: 24px;
      padding: 48px 40px;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.8), 0 0 60px rgba(255, 107, 53, 0.1);
      position: relative;
      overflow: hidden;
    }

    .auth-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255, 107, 53, 0.3), transparent);
    }

    /* Logo */
    .auth-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 36px;
      justify-content: center;
    }

    .auth-logo-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, rgba(255, 107, 53, 0.2), rgba(255, 107, 53, 0.05));
      border: 1.5px solid rgba(255, 107, 53, 0.4);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--accent);
      font-weight: 800;
      font-size: 18px;
    }

    .auth-logo-name {
      font-size: 22px;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.5px;
    }

    /* Headings */
    .auth-title {
      font-size: 28px;
      font-weight: 800;
      text-align: center;
      margin-bottom: 8px;
      color: var(--text);
      letter-spacing: -0.5px;
    }

    .auth-subtitle {
      font-size: 14px;
      color: var(--text-dim);
      text-align: center;
      margin-bottom: 32px;
    }

    /* Google button */
    .btn-google {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 13px 20px;
      background: #fff;
      color: #111;
      border: none;
      border-radius: var(--r-lg);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 18px;
      font-family: 'Inter', sans-serif;
    }

    .btn-google:hover {
      background: #f0f0f0;
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(255, 255, 255, 0.15);
    }

    .btn-google:active {
      transform: translateY(0);
    }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }

    .divider-line {
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .divider-text {
      font-size: 12px;
      color: var(--text-muted);
      font-weight: 500;
    }

    /* Inputs */
    .input-group {
      margin-bottom: 16px;
    }

    .input-label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-dim);
      margin-bottom: 7px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .auth-input {
      width: 100%;
      background: rgba(26, 26, 26, 0.8);
      border: 1px solid var(--border-md);
      border-radius: var(--r-md);
      color: var(--text);
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      padding: 12px 16px;
      outline: none;
      transition: all 0.2s;
    }

    .auth-input:focus {
      border-color: var(--accent);
      background: rgba(26, 26, 26, 1);
      box-shadow: 0 0 0 3px rgba(255, 107, 53, 0.1);
    }

    .auth-input::placeholder {
      color: var(--text-muted);
    }

    /* Name row (for signup) */
    .name-row {
      display: flex;
      gap: 12px;
    }

    .name-row .input-group {
      flex: 1;
    }

    /* Primary button */
    .btn-primary {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, var(--accent), #ff8a50);
      border: none;
      border-radius: var(--r-lg);
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      transition: all 0.2s;
      font-family: 'Inter', sans-serif;
      letter-spacing: 0.3px;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 32px rgba(255, 107, 53, 0.3);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .btn-primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    /* Error */
    .auth-error {
      font-size: 13px;
      color: var(--red);
      margin-top: 12px;
      text-align: center;
      min-height: 20px;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-5px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Toggle */
    .auth-toggle {
      text-align: center;
      margin-top: 24px;
      font-size: 13px;
      color: var(--text-dim);
    }

    .auth-toggle-btn {
      background: none;
      border: none;
      color: var(--accent);
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      padding: 0;
      transition: color 0.2s;
    }

    .auth-toggle-btn:hover {
      color: #ff8a50;
    }

    /* Guest link */
    .guest-link {
      text-align: center;
      margin-top: 20px;
    }

    .btn-guest {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 12px;
      cursor: pointer;
      text-decoration: underline;
      transition: color 0.2s;
      font-family: 'Inter', sans-serif;
    }

    .btn-guest:hover {
      color: var(--text-dim);
    }

    /* Loading spinner */
    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: inline-block;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* Hidden */
    .hidden {
      display: none !important;
    }

    /* Terms */
    .auth-terms {
      font-size: 11px;
      color: var(--text-muted);
      text-align: center;
      margin-top: 16px;
      line-height: 1.6;
    }

    /* Responsive */
    @media (max-width: 480px) {
      .auth-card {
        padding: 36px 28px;
      }

      .auth-title {
        font-size: 24px;
      }

      .name-row {
        flex-direction: column;
      }

      .name-row .input-group {
        flex: 1;
      }
    }
  </style>
</head>
<body>
<canvas id="particles-canvas"></canvas>
<div class="bg-glow"></div>

<div class="auth-page">
  <div class="auth-card">

    <!-- Logo -->
    <div class="auth-logo">
      <div class="auth-logo-icon">I</div>
      <span class="auth-logo-name">IlyassAI</span>
    </div>

    <!-- Title (changes between login/signup) -->
    <h1 class="auth-title" id="authTitle">Welcome back</h1>
    <p class="auth-subtitle" id="authSubtitle">Sign in to your account to continue</p>

    <!-- Google -->
    <button class="btn-google" onclick="googleLogin()">
      <svg width="18" height="18" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Continue with Google
    </button>

    <!-- Divider -->
    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-text">or</span>
      <div class="divider-line"></div>
    </div>

    <!-- Name fields (signup only) -->
    <div id="nameRow" class="name-row hidden">
      <div class="input-group">
        <label class="input-label">First name</label>
        <input class="auth-input" id="authFirstName" type="text" placeholder="Ilyass" autocomplete="given-name"/>
      </div>
      <div class="input-group">
        <label class="input-label">Last name</label>
        <input class="auth-input" id="authLastName" type="text" placeholder="AI" autocomplete="family-name"/>
      </div>
    </div>

    <!-- Email -->
    <div class="input-group">
      <label class="input-label">Email address</label>
      <input class="auth-input" id="authEmail" type="email" placeholder="you@example.com" autocomplete="email"/>
    </div>

    <!-- Password -->
    <div class="input-group">
      <label class="input-label">Password</label>
      <input class="auth-input" id="authPassword" type="password" placeholder="••••••••" autocomplete="current-password"/>
    </div>

    <!-- Submit -->
    <button class="btn-primary" id="authSubmitBtn" onclick="handleSubmit()">Sign in</button>

    <!-- Error -->
    <div class="auth-error" id="authError"></div>

    <!-- Toggle -->
    <div class="auth-toggle">
      <span id="toggleText">Don't have an account?</span>
      <button class="auth-toggle-btn" id="toggleBtn" onclick="toggleMode()">Sign up</button>
    </div>

    <!-- Guest -->
    <div class="guest-link">
      <button class="btn-guest" onclick="continueAsGuest()">Continue as guest</button>
    </div>

    <!-- Terms -->
    <p class="auth-terms">By signing in, you agree to IlyassAI's Terms of Service</p>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth, GoogleAuthProvider, signInWithPopup,
  createUserWithEmailAndPassword, signInWithEmailAndPassword,
  signInAnonymously, onAuthStateChanged, updateProfile
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
  getFirestore, doc, setDoc, getDoc, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDWch9gK12sGD7awxmRibU6jBspd-tjr6E",
  authDomain: "ilyassagentai.firebaseapp.com",
  projectId: "ilyassagentai",
  storageBucket: "ilyassagentai.firebasestorage.app",
  messagingSenderId: "1070041614552",
  appId: "1:1070041614552:web:your-app-id"
};

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);
const googleProvider = new GoogleAuthProvider();

// If already logged in → redirect
onAuthStateChanged(auth, user => {
  if (user && !user.isAnonymous) {
    window.location.href = '/app';
  }
});

// Save user profile to Firestore
async function saveProfile(user) {
  const ref = doc(db, 'users', user.uid);
  const snap = await getDoc(ref);
  if (!snap.exists()) {
    await setDoc(ref, {
      uid: user.uid,
      displayName: user.displayName || user.email?.split('@')[0] || 'User',
      email: user.email || '',
      photoURL: user.photoURL || '',
      plan: 'free',
      createdAt: serverTimestamp(),
      conversations: [],
      settings: { theme: 'dark', mode: 'auto' }
    });
  }
}

async function afterLogin(user) {
  await saveProfile(user);
  window.location.href = '/app';
}

let mode = 'login';
window.toggleMode = () => {
  mode = mode === 'login' ? 'signup' : 'login';
  const isSignup = mode === 'signup';
  document.getElementById('authTitle').textContent     = isSignup ? 'Create account' : 'Welcome back';
  document.getElementById('authSubtitle').textContent  = isSignup ? 'Join IlyassAI for free' : 'Sign in to your account to continue';
  document.getElementById('authSubmitBtn').textContent = isSignup ? 'Create account' : 'Sign in';
  document.getElementById('toggleText').textContent    = isSignup ? 'Already have an account?' : "Don't have an account?";
  document.getElementById('toggleBtn').textContent     = isSignup ? 'Sign in' : 'Sign up';
  document.getElementById('nameRow').classList.toggle('hidden', !isSignup);
  document.getElementById('authError').textContent = '';
};

window.googleLogin = async () => {
  try {
    const result = await signInWithPopup(auth, googleProvider);
    await afterLogin(result.user);
  } catch(e) {
    document.getElementById('authError').textContent = '❌ ' + (e.message || 'Google sign-in failed');
  }
};

window.handleSubmit = async () => {
  const email    = document.getElementById('authEmail').value.trim();
  const password = document.getElementById('authPassword').value;
  const errorEl  = document.getElementById('authError');
  const btn      = document.getElementById('authSubmitBtn');

  errorEl.textContent = '';
  if (!email || !password) { errorEl.textContent = '❌ Please fill all fields'; return; }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Loading...';

  try {
    let result;
    if (mode === 'signup') {
      result = await createUserWithEmailAndPassword(auth, email, password);
      const firstName = document.getElementById('authFirstName').value.trim();
      const lastName  = document.getElementById('authLastName').value.trim();
      const name = [firstName, lastName].filter(Boolean).join(' ') || email.split('@')[0];
      await updateProfile(result.user, { displayName: name });
    } else {
      result = await signInWithEmailAndPassword(auth, email, password);
    }
    await afterLogin(result.user);
  } catch(e) {
    const msg = e.code === 'auth/wrong-password'       ? '❌ Wrong password'
              : e.code === 'auth/user-not-found'       ? '❌ Account not found. Sign up first.'
              : e.code === 'auth/email-already-in-use' ? '❌ Email already registered'
              : e.code === 'auth/weak-password'        ? '❌ Password must be at least 6 characters'
              : e.code === 'auth/invalid-email'        ? '❌ Invalid email address'
              : '❌ ' + e.message;
    errorEl.textContent = msg;
    btn.disabled = false;
    btn.textContent = mode === 'signup' ? 'Create account' : 'Sign in';
  }
};

window.continueAsGuest = async () => {
  try {
    await signInAnonymously(auth);
    window.location.href = '/app';
  } catch(e) {
    document.getElementById('authError').textContent = '❌ ' + e.message;
  }
};

// Enter key support
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') window.handleSubmit();
});

// ════════════════════════════════════════════════════════════
// PARTICLES EFFECT WITH THREE.JS
// ════════════════════════════════════════════════════════════

class ParticleSystem {
  constructor() {
    this.canvas = document.getElementById('particles-canvas');
    this.scene = new THREE.Scene();
    this.camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    this.renderer = new THREE.WebGLRenderer({ canvas: this.canvas, alpha: true, antialias: true });
    this.renderer.setSize(window.innerWidth, window.innerHeight);
    this.renderer.setPixelRatio(window.devicePixelRatio);
    this.camera.position.z = 100;

    this.particles = [];
    this.createParticles();
    this.animate();
    this.setupEventListeners();
  }

  createParticles() {
    const geometry = new THREE.BufferGeometry();
    const positions = [];
    const colors = [];
    const sizes = [];

    const particleCount = 80;
    const accentColor = new THREE.Color(0xff6b35);
    const darkColor = new THREE.Color(0x1a1a1a);

    for (let i = 0; i < particleCount; i++) {
      const x = (Math.random() - 0.5) * window.innerWidth / 10;
      const y = (Math.random() - 0.5) * window.innerHeight / 10;
      const z = (Math.random() - 0.5) * 200;

      positions.push(x, y, z);

      const color = Math.random() > 0.7 ? accentColor : darkColor;
      colors.push(color.r, color.g, color.b);

      sizes.push(Math.random() * 2 + 0.5);

      this.particles.push({
        x, y, z,
        vx: (Math.random() - 0.5) * 0.5,
        vy: (Math.random() - 0.5) * 0.5,
        vz: (Math.random() - 0.5) * 0.3,
        size: sizes[i * 3]
      });
    }

    geometry.setAttribute('position', new THREE.BufferAttribute(new Float32Array(positions), 3));
    geometry.setAttribute('color', new THREE.BufferAttribute(new Float32Array(colors), 3));
    geometry.setAttribute('size', new THREE.BufferAttribute(new Float32Array(sizes), 1));

    const material = new THREE.PointsMaterial({
      vertexColors: true,
      sizeAttenuation: true,
      transparent: true,
      opacity: 0.6
    });

    this.points = new THREE.Points(geometry, material);
    this.scene.add(this.points);
  }

  animate = () => {
    requestAnimationFrame(this.animate);

    const positions = this.points.geometry.attributes.position.array;

    this.particles.forEach((p, i) => {
      p.x += p.vx;
      p.y += p.vy;
      p.z += p.vz;

      if (Math.abs(p.x) > window.innerWidth / 5) p.vx *= -1;
      if (Math.abs(p.y) > window.innerHeight / 5) p.vy *= -1;
      if (Math.abs(p.z) > 100) p.vz *= -1;

      positions[i * 3] = p.x;
      positions[i * 3 + 1] = p.y;
      positions[i * 3 + 2] = p.z;
    });

    this.points.geometry.attributes.position.needsUpdate = true;
    this.renderer.render(this.scene, this.camera);
  };

  setupEventListeners() {
    window.addEventListener('resize', () => {
      this.camera.aspect = window.innerWidth / window.innerHeight;
      this.camera.updateProjectionMatrix();
      this.renderer.setSize(window.innerWidth, window.innerHeight);
    });
  }
}

// Initialize particles
new ParticleSystem();
</script>
</body>
</html>
