<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatGPT</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="app-container">
        <!-- SIDEBAR -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <button class="new-chat-btn" onclick="location.reload()">
                    <i data-lucide="plus"></i>
                    <span>New Chat</span>
                </button>
            </div>
            <div class="chat-history" id="chatHistory">
                <!-- History items will be injected here -->
                <div class="history-group">Yesterday</div>
                <div class="history-item active">
                    <i data-lucide="message-square"></i>
                    <span>New Conversation</span>
                </div>
            </div>
            <div class="sidebar-footer">
                <button class="nav-btn" id="settingsTrigger">
                    <i data-lucide="settings"></i>
                    <span>Settings</span>
                </button>
                <div class="user-profile">
                    <div class="user-avatar">U</div>
                    <span>User</span>
                </div>
            </div>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="main-content">
            <!-- TOP NAV (Mobile) -->
            <header class="mobile-nav">
                <button id="menuToggle"><i data-lucide="menu"></i></button>
                <span>ChatGPT</span>
                <button onclick="location.reload()"><i data-lucide="plus"></i></button>
            </header>

            <!-- CHAT AREA -->
            <div id="chatContainer" class="chat-container">
                <!-- Initial Hero View -->
                <section id="home" class="hero-view">
                    <div class="hero-logo">
                        <div class="chatgpt-logo">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path>
                            </svg>
                        </div>
                        <h1>How can I help you today?</h1>
                    </div>
                </section>

                <!-- Messages List -->
                <section id="chat" class="chat-view hidden">
                    <div id="messages" class="messages-list"></div>
                </section>
            </div>

            <!-- INPUT AREA -->
            <footer class="input-area-container">
                <div class="input-wrapper">
                    <div class="input-box">
                        <button class="attach-btn" onclick="document.getElementById('fileInput').click()">
                            <i data-lucide="paperclip"></i>
                        </button>
                        <input type="file" id="fileInput" class="hidden" multiple>
                        <textarea id="userInput" placeholder="Message ChatGPT..." rows="1" oninput="autoResize(this)" onkeydown="handleKeydown(event)"></textarea>
                        <button class="send-btn" id="sendBtn" onclick="handleSend()">
                            <i data-lucide="arrow-up"></i>
                        </button>
                    </div>
                    <p class="input-footer">ChatGPT can make mistakes. Check important info.</p>
                </div>
            </footer>
        </main>
    </div>

    <!-- AUTH MODAL (Hidden by default) -->
    <div id="authModal" class="modal">
        <div class="modal-content">
            <h2 id="authTitle">Login</h2>
            <input id="authEmail" type="email" placeholder="Email">
            <input id="authPassword" type="password" placeholder="Password">
            <button id="authSubmit">Continue</button>
            <button class="secondary-btn" onclick="closeAuthModal()">Cancel</button>
        </div>
    </div>

    <script src="ControleAi.js"></script>
    <script src="features.js"></script>
    <script type="module" src="firebase.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            AI.init("messages", "/api/chat");
            
            // Mobile Menu Toggle
            const menuToggle = document.getElementById('menuToggle');
            const sidebar = document.getElementById('sidebar');
            if(menuToggle) {
                menuToggle.addEventListener('click', () => {
                    sidebar.classList.toggle('open');
                });
            }
        });

        function autoResize(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = textarea.scrollHeight + 'px';
        }

        function handleKeydown(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleSend();
            }
        }

        function handleSend() {
            const input = document.getElementById('userInput');
            const text = input.value.trim();
            if (!text) return;

            // Switch view if first message
            document.getElementById('home').classList.add('hidden');
            document.getElementById('chat').classList.remove('hidden');

            AI.user(text);
            input.value = '';
            input.style.height = 'auto';
            AI.ask(text);
        }
    </script>
</body>
</html>
