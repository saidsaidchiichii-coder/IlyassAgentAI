<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grok</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

    <!-- NAVIGATION -->
    <header class="top-nav">
        <div class="nav-left">
            <div class="logo-container" onclick="location.reload()">
                <svg class="grok-logo" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"></circle>
                    <line x1="14.31" y1="8" x2="20.05" y2="17.94"></line>
                    <line x1="9.69" y1="8" x2="21.17" y2="8"></line>
                    <line x1="7.38" y1="12" x2="13.12" y2="2.06"></line>
                    <line x1="9.69" y1="16" x2="3.95" y2="6.06"></line>
                    <line x1="14.31" y1="16" x2="2.83" y2="16"></line>
                    <line x1="16.62" y1="12" x2="10.88" y2="21.94"></line>
                </svg>
            </div>
        </div>
        
        <div class="nav-right">
            <button class="nav-btn" onclick="openImagine()">
                <i data-lucide="sparkles"></i>
                <span>Imagine</span>
            </button>
            <button class="nav-btn" id="settingsTrigger">
                <i data-lucide="settings"></i>
            </button>
            <button class="btn-signin">Sign in</button>
            <button class="btn-signup">Sign up</button>
        </div>
    </header>

    <main class="container">

        <!-- HOME VIEW -->
        <section id="home" class="home-view">
            <div class="hero-section">
                <div class="hero-logo">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <circle cx="12" cy="12" r="10"></circle>
                        <line x1="14.31" y1="8" x2="20.05" y2="17.94"></line>
                        <line x1="9.69" y1="8" x2="21.17" y2="8"></line>
                        <line x1="7.38" y1="12" x2="13.12" y2="2.06"></line>
                        <line x1="9.69" y1="16" x2="3.95" y2="6.06"></line>
                        <line x1="14.31" y1="16" x2="2.83" y2="16"></line>
                        <line x1="16.62" y1="12" x2="10.88" y2="21.94"></line>
                    </svg>
                    <h1>Grok</h1>
                </div>
            </div>
            
            <div class="search-container">
                <div class="search-box">
                    <div class="input-area">
                        <button class="input-icon">
                            <i data-lucide="paperclip"></i>
                        </button>
                        <textarea id="homeInput" placeholder="How can I help you today?" rows="1" oninput="autoResize(this)" onkeydown="handleKeydown(event, 'home')"></textarea>
                        <div class="input-controls">
                            <div class="mode-selector">
                                <span>Auto</span>
                                <i data-lucide="chevron-down"></i>
                            </div>
                            <button class="control-btn">
                                <i data-lucide="mic"></i>
                            </button>
                            <button class="control-btn send-btn" onclick="startChat()">
                                <i data-lucide="arrow-up"></i>
                            </button>
                        </div>
                    </div>
                </div>
                <div class="search-hint">
                    <i data-lucide="sparkles"></i>
                    <span>New · Hold Ctrl+D to dictate</span>
                </div>
            </div>
        </section>

        <!-- CHAT VIEW -->
        <section id="chat" class="chat-view hidden">
            <div id="messages" class="messages-list"></div>

            <div class="chat-input-container">
                <div class="search-box">
                    <div class="input-area">
                        <button class="input-icon">
                            <i data-lucide="paperclip"></i>
                        </button>
                        <textarea id="chatInput" placeholder="Send a message..." rows="1" oninput="autoResize(this)" onkeydown="handleKeydown(event, 'chat')"></textarea>
                        <div class="input-controls">
                            <div class="mode-selector">
                                <span>Auto</span>
                                <i data-lucide="chevron-down"></i>
                            </div>
                            <button class="control-btn">
                                <i data-lucide="mic"></i>
                            </button>
                            <button class="control-btn send-btn" onclick="send()">
                                <i data-lucide="arrow-up"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </section>
<!-- IMAGINE VIEW -->
<section id="imagine" class="home-view hidden">

    <!-- FEATURED -->
    <div style="padding:20px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:15px;">
            <h3>Featured Templates</h3>
            <span style="opacity:0.7;cursor:pointer;">View All</span>
        </div>

        <div style="display:flex;gap:12px;overflow-x:auto;">

            <div style="min-width:180px;position:relative;border-radius:12px;overflow:hidden;">
                <video src="./video1.mp4" autoplay muted loop playsinline style="width:100%;height:250px;object-fit:cover;"></video>
                <span style="position:absolute;bottom:8px;left:10px;color:white;">Funky Dance</span>
            </div>

            <div style="min-width:180px;position:relative;border-radius:12px;overflow:hidden;">
                <video src="./video2.mp4" autoplay muted loop playsinline style="width:100%;height:250px;object-fit:cover;"></video>
                <span style="position:absolute;bottom:8px;left:10px;color:white;">Chibi</span>
            </div>

            <div style="min-width:180px;position:relative;border-radius:12px;overflow:hidden;">
                <video src="./video3.mp4" autoplay muted loop playsinline style="width:100%;height:250px;object-fit:cover;"></video>
                <span style="position:absolute;bottom:8px;left:10px;color:white;">Pulp Cover</span>
            </div>

            <div style="min-width:180px;position:relative;border-radius:12px;overflow:hidden;">
                <video src="./video4.mp4" autoplay muted loop playsinline style="width:100%;height:250px;object-fit:cover;"></video>
                <span style="position:absolute;bottom:8px;left:10px;color:white;">Street Style</span>
            </div>

        </div>
    </div>

    <!-- DISCOVER -->
    <div style="padding:20px;">
        <h3 style="margin-bottom:15px;">Discover</h3>

        <div style="
            display:grid;
            grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
            gap:12px;
        ">

            <video src="./video1.mp4" autoplay muted loop playsinline style="width:100%;height:220px;object-fit:cover;border-radius:12px;"></video>
            <video src="./video2.mp4" autoplay muted loop playsinline style="width:100%;height:220px;object-fit:cover;border-radius:12px;"></video>
            <video src="./video3.mp4" autoplay muted loop playsinline style="width:100%;height:220px;object-fit:cover;border-radius:12px;"></video>
            <video src="./video4.mp4" autoplay muted loop playsinline style="width:100%;height:220px;object-fit:cover;border-radius:12px;"></video>

        </div>
    </div>

    <!-- INPUT LIKE GROK -->
    <div style="
        position:fixed;
        bottom:20px;
        left:50%;
        transform:translateX(-50%);
        width:600px;
        max-width:90%;
        background:#1a1a1a;
        border-radius:30px;
        padding:10px 15px;
        display:flex;
        align-items:center;
        gap:10px;
    ">
        <span style="font-size:20px;">＋</span>
        <input type="text" placeholder="Type to imagine" style="
            flex:1;
            background:transparent;
            border:none;
            outline:none;
            color:white;
        ">
        <span style="opacity:0.7;">Image</span>
        <span style="opacity:0.7;">Video</span>
    </div>

</section>
