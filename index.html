<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grok</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

    <!-- NAVIGATION -->
    <header class="top-nav">
        <div class="nav-left">
            <div class="logo-container" onclick="location.reload()">
                <svg class="grok-logo" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"></circle>
                    <line x1="14.31" y1="8" x2="20.05" y2="17.94"></line>
                    <line x1="9.69" y1="8" x2="21.17" y2="8"></line>
                    <line x1="7.38" y1="12" x2="13.12" y2="2.06"></line>
                    <line x1="9.69" y1="16" x2="3.95" y2="6.06"></line>
                    <line x1="14.31" y1="16" x2="2.83" y2="16"></line>
                    <line x1="16.62" y1="12" x2="10.88" y2="21.94"></line>
                </svg>
            </div>
        </div>
        
        <div class="nav-right">
            <button class="nav-btn">
                <i data-lucide="sparkles"></i>
                <span>Imagine</span>
            </button>
            <button class="nav-btn" id="settingsTrigger">
                <i data-lucide="settings"></i>
            </button>
            <button class="btn-signin">Sign in</button>
            <button class="btn-signup">Sign up</button>
        </div>
    </header>

    <main class="container">
        <!-- HOME VIEW -->
        <section id="home" class="home-view">
            <div class="hero-section">
                <div class="hero-logo">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <circle cx="12" cy="12" r="10"></circle>
                        <line x1="14.31" y1="8" x2="20.05" y2="17.94"></line>
                        <line x1="9.69" y1="8" x2="21.17" y2="8"></line>
                        <line x1="7.38" y1="12" x2="13.12" y2="2.06"></line>
                        <line x1="9.69" y1="16" x2="3.95" y2="6.06"></line>
                        <line x1="14.31" y1="16" x2="2.83" y2="16"></line>
                        <line x1="16.62" y1="12" x2="10.88" y2="21.94"></line>
                    </svg>
                    <h1>Grok</h1>
                </div>
            </div>
            
            <div class="search-container">
                <div class="search-box">
                    <div class="input-area">
                        <button class="input-icon">
                            <i data-lucide="paperclip"></i>
                        </button>
                        <textarea id="homeInput" placeholder="How can I help you today?" rows="1" oninput="autoResize(this)" onkeydown="handleKeydown(event, 'home')"></textarea>
                        <div class="input-controls">
                            <div class="mode-selector">
                                <span>Auto</span>
                                <i data-lucide="chevron-down"></i>
                            </div>
                            <button class="control-btn">
                                <i data-lucide="mic"></i>
                            </button>
                            <button class="control-btn send-btn" onclick="startChat()">
                                <i data-lucide="arrow-up"></i>
                            </button>
                        </div>
                    </div>
                </div>
                <div class="search-hint">
                    <i data-lucide="sparkles"></i>
                    <span>New · Hold Ctrl+D to dictate</span>
                </div>
            </div>
        </section>

        <!-- CHAT VIEW -->
        <section id="chat" class="chat-view hidden">
            <div id="messages" class="messages-list"></div>

            <div class="chat-input-container">
                <div class="search-box">
                    <div class="input-area">
                        <button class="input-icon">
                            <i data-lucide="paperclip"></i>
                        </button>
                        <textarea id="chatInput" placeholder="Send a message..." rows="1" oninput="autoResize(this)" onkeydown="handleKeydown(event, 'chat')"></textarea>
                        <div class="input-controls">
                            <div class="mode-selector">
                                <span>Auto</span>
                                <i data-lucide="chevron-down"></i>
                            </div>
                            <button class="control-btn">
                                <i data-lucide="mic"></i>
                            </button>
                            <button class="control-btn send-btn" onclick="send()">
                                <i data-lucide="arrow-up"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="ControleAi.js"></script>

    <script>
        lucide.createIcons();
        AI.init("messages", "https://my-webxyu.vercel.app/api/chat");

        const homeView = document.getElementById("home");
        const chatView = document.getElementById("chat");

        function autoResize(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = Math.min(textarea.scrollHeight, 200) + 'px';
        }

        function handleKeydown(event, type) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                if (type === 'home') startChat();
                else send();
            }
        }

        function startChat() {
            const input = document.getElementById("homeInput");
            const text = input.value.trim();
            if (!text) return;
            
            homeView.classList.add("hidden");
            chatView.classList.remove("hidden");
            AI.user(text);
            input.value = "";
            input.style.height = 'auto';
            AI.ask(text);
        }

        function send() {
            const input = document.getElementById("chatInput");
            const text = input.value.trim();
            if (!text) return;

            // 🔥 IMAGINE DETECT FIX
            if (
                text.toLowerCase().includes("image") ||
                text.toLowerCase().includes("imagine") ||
                text.toLowerCase().includes("generate image")
            ) {
                triggerImagineSafe();
                input.value = "";
                input.style.height = 'auto';
                return;
            }

            AI.user(text);
            input.value = "";
            input.style.height = 'auto';
            AI.ask(text);
        }
    </script>

    <!-- 🔥 IMAGINE MODAL (ADDED SAFE) -->
    <div id="imagineModal" class="modal hidden">
        <div class="modal-box">
            <h2>✨ AI Image Generation</h2>
            <p>This feature uses external AI tools.</p>

            <div style="display:flex;justify-content:space-between;margin-top:20px;">
                <button onclick="closeImagineSafe()" style="background:#333;color:white;padding:10px;border-radius:10px;">Cancel</button>
                <button onclick="acceptImagineSafe()" style="background:#00ff99;color:black;padding:10px;border-radius:10px;font-weight:bold;">Try Now</button>
            </div>
        </div>
    </div>

    <script>
        // ===============================
        // 🔥 IMAGINE SAFE PATCH (ADDED)
        // ===============================

        let IMAGINE_LOCK = false;
        let pendingImagineLink = "https://runwayml.com";

        function triggerImagineSafe() {
            if (IMAGINE_LOCK) return;

            try {
                IMAGINE_LOCK = true;

                const modal = document.getElementById("imagineModal");
                if (modal) modal.classList.remove("hidden");

                setTimeout(() => IMAGINE_LOCK = false, 2000);

            } catch (e) {
                IMAGINE_LOCK = false;
            }
        }

        function closeImagineSafe() {
            const modal = document.getElementById("imagineModal");
            if (modal) modal.classList.add("hidden");
        }

        function acceptImagineSafe() {
            try {
                if (pendingImagineLink) {
                    window.open(pendingImagineLink, "_blank");
                }
            } catch (e) {}

            closeImagineSafe();
        }

        // ===============================
        // 🔥 AI PROTECTION LAYER
        // ===============================

        const originalAsk = AI.ask;

        AI.ask = function(text) {
            try {
                if (typeof text === "string") {
                    const t = text.toLowerCase();

                    if (
                        t.includes("image") ||
                        t.includes("imagine") ||
                        t.includes("generate image")
                    ) {
                        triggerImagineSafe();
                        return;
                    }
                }

                return originalAsk.call(this, text);

            } catch (e) {}
        };

        // ===============================
        // 🔥 VIDEO SAFE FIX
        // ===============================

        document.addEventListener("DOMContentLoaded", () => {
            const videos = document.querySelectorAll("video");

            videos.forEach(v => {
                v.addEventListener("error", () => {
                    v.style.display = "none";
                });

                v.addEventListener("stalled", () => {
                    v.load();
                });
            });
        });
    </script>

</body>
</html>
