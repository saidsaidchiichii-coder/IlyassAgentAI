<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatGPT</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<body>
    <div class="app-layout">
        <!-- SIDEBAR -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-content">
                <button class="new-chat-btn" onclick="location.reload()">
                    <div class="new-chat-icon">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 5V19M5 12H19" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </div>
                    <span>New chat</span>
                    <i data-lucide="square-pen" class="edit-icon"></i>
                </button>
                
                <nav class="chat-history">
                    <div class="history-section">
                        <h3 class="history-title">Yesterday</h3>
                        <div class="history-item active">
                            <span>New Conversation</span>
                        </div>
                    </div>
                </nav>

                <div class="sidebar-footer">
                    <button class="footer-item">
                        <div class="avatar-small">U</div>
                        <span>Upgrade plan</span>
                    </button>
                    <button class="footer-item user-menu">
                        <div class="avatar-user">U</div>
                        <span>User Name</span>
                    </button>
                </div>
            </div>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="main-container">
            <!-- TOP BAR (Mobile) -->
            <div class="mobile-header">
                <button id="sidebarToggle"><i data-lucide="menu"></i></button>
                <div class="model-selector">ChatGPT 4o <i data-lucide="chevron-down"></i></div>
                <button><i data-lucide="square-pen"></i></button>
            </div>

                    <h1>How can I help you today?</h1>
                </div>

                <!-- MESSAGES -->
                <div id="chatMessages" class="chat-messages hidden">
                    <!-- Messages will be injected here -->
                </div>
            </div>

            <!-- INPUT AREA -->
            <div class="input-container">
                <div class="input-bar-wrapper">
                    <div class="input-bar">
                        <button class="action-btn"><i data-lucide="paperclip"></i></button>
                        <textarea id="chatInput" placeholder="Message ChatGPT" rows="1"></textarea>
                        <button id="sendBtn" class="send-button"><i data-lucide="arrow-up"></i></button>
                    </div>
                    <div class="disclaimer">ChatGPT can make mistakes. Check important info.</div>
                </div>
            </div>
        </main>
    </div>

    <script src="ControleAi.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            AI.init("chatMessages", "/api/chat");
            
            const input = document.getElementById('chatInput');
            input.addEventListener('input', function() {
                this.style.height = 'auto';
                this.style.height = (this.scrollHeight) + 'px';
            });

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    handleSendMessage();
                }
            });

            document.getElementById('sendBtn').addEventListener('click', handleSendMessage);
            
            // Sidebar Toggle
            const sidebarToggle = document.getElementById('sidebarToggle');
            const sidebar = document.getElementById('sidebar');
            if(sidebarToggle) {
                sidebarToggle.addEventListener('click', () => {
                    sidebar.classList.toggle('visible');
                });
            }
        });

        function handleSendMessage() {
            const input = document.getElementById('chatInput');
            const text = input.value.trim();
            if (!text) return;

            document.getElementById('heroView').classList.add('hidden');
            document.getElementById('chatMessages').classList.remove('hidden');

            AI.user(text);
            input.value = '';
            input.style.height = 'auto';
            AI.ask(text);
        }
    </script>
