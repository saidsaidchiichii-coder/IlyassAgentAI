<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grok</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<script src="https://unpkg.com/lucide@latest"></script>

<style>

/* ================= ROOT ================= */
:root{
  --bg:#000;
  --text:#e7e9ea;
  --accent:#1d9bf0;
  --border:#2f3336;
}

/* ================= GLOBAL ================= */
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:var(--bg);
  color:var(--text);
  font-family:Inter;
  overflow:hidden;
}

/* ================= AUTH MODAL ================= */
#authModal{
  position:fixed;
  inset:0;
  display:none;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,.7);
  backdrop-filter:blur(10px);
  z-index:9999;
}

#authModal .box{
  width:340px;
  padding:25px;
  border-radius:16px;
  background:rgba(20,20,20,.95);
  border:1px solid rgba(255,255,255,.08);
}

#authModal input{
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
  border:none;
  background:#222;
  color:white;
}

#authModal button{
  width:100%;
  margin-top:15px;
  padding:10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

#authSubmit{
  background:#4f46e5;
  color:white;
  font-weight:bold;
}

/* ================= NAV ================= */
.top-nav{
  height:56px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 16px;
  border-bottom:1px solid var(--border);
}

/* ================= HOME ================= */
.home-view{
  height:calc(100vh - 56px);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

.hero-logo h1{
  font-size:50px;
}

/* ================= CHAT ================= */
.chat-view{
  height:calc(100vh - 56px);
  display:flex;
  flex-direction:column;
}

.messages-list{
  flex:1;
  overflow:auto;
  padding:20px;
}

.msg{
  padding:10px;
  margin:5px 0;
  border-radius:10px;
}

.user{background:var(--accent);color:white;align-self:flex-end}
.ai{border-left:2px solid var(--accent)}

/* ================= INPUT ================= */
.chat-input-container{
  padding:15px;
  border-top:1px solid var(--border);
}

textarea{
  width:100%;
  padding:10px;
  border-radius:10px;
  border:none;
  background:#16181c;
  color:white;
}

/* ================= UTIL ================= */
.hidden{display:none}

button{
  cursor:pointer;
}

</style>
</head>

<body>

<!-- ================= NAV ================= -->
<header class="top-nav">
  <div onclick="location.reload()">GROK</div>

  <div>
    <button onclick="openAuth()">Sign in</button>
    <button onclick="openAuth()">Sign up</button>
  </div>
</header>

<!-- ================= AUTH ================= -->
<div id="authModal">
  <div class="box">
    <h2 id="authTitle">Login</h2>

    <input id="authEmail" type="email" placeholder="Email">
    <input id="authPassword" type="password" placeholder="Password">

    <button id="authSubmit" onclick="login()">Continue</button>
    <button onclick="closeAuth()" style="background:#333;color:white;">Cancel</button>
  </div>
</div>

<!-- ================= HOME ================= -->
<section id="home" class="home-view">

  <div class="hero-logo">
    <h1>Grok</h1>
  </div>

  <textarea id="homeInput" placeholder="Ask anything..."></textarea>
  <button onclick="startChat()">Send</button>

</section>

<!-- ================= CHAT ================= -->
<section id="chat" class="chat-view hidden">

  <div id="messages" class="messages-list"></div>

  <div class="chat-input-container">
    <textarea id="chatInput" placeholder="Message..."></textarea>
    <button onclick="send()">Send</button>
  </div>

</section>

<!-- ================= SCRIPT ================= -->
<script>

const home=document.getElementById("home");
const chat=document.getElementById("chat");
const modal=document.getElementById("authModal");
const messages=document.getElementById("messages");

/* ========= AUTH ========= */
function openAuth(){modal.style.display="flex"}
function closeAuth(){modal.style.display="none"}

function login(){
  const e=document.getElementById("authEmail").value;
  const p=document.getElementById("authPassword").value;

  if(!e||!p)return alert("Fill all fields");

  localStorage.setItem("user",e);
  closeAuth();
}

/* ========= CHAT ========= */
function startChat(){
  const t=document.getElementById("homeInput").value;
  if(!t)return;

  home.classList.add("hidden");
  chat.classList.remove("hidden");

  add("user",t);
  fakeAI(t);
}

function send(){
  const t=document.getElementById("chatInput").value;
  if(!t)return;

  add("user",t);
  document.getElementById("chatInput").value="";
  fakeAI(t);
}

function add(role,text){
  const d=document.createElement("div");
  d.className="msg "+role;
  d.innerText=text;
  messages.appendChild(d);
  messages.scrollTop=messages.scrollHeight;
}

function fakeAI(t){
  setTimeout(()=>add("ai","AI: "+t),500);
}

</script>

</body>
</html>
