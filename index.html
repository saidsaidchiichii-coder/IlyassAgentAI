<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grok</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

    <!-- NAVIGATION -->
    <header class="top-nav">
        <div class="nav-left">
            <div class="logo-container" onclick="location.reload()">
                <svg class="grok-logo" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"></circle>
                    <line x1="14.31" y1="8" x2="20.05" y2="17.94"></line>
                    <line x1="9.69" y1="8" x2="21.17" y2="8"></line>
                    <line x1="7.38" y1="12" x2="13.12" y2="2.06"></line>
                    <line x1="9.69" y1="16" x2="3.95" y2="6.06"></line>
                    <line x1="14.31" y1="16" x2="2.83" y2="16"></line>
                    <line x1="16.62" y1="12" x2="10.88" y2="21.94"></line>
                </svg>
            </div>
        </div>
        
        <div class="nav-right">
            <button class="nav-btn" onclick="openImagine()">
                <i data-lucide="sparkles"></i>
                <span>Imagine</span>
            </button>
            <button class="nav-btn" id="settingsTrigger">
                <i data-lucide="settings"></i>
            </button>
            <button class="btn-signin" onclick="openLogin()">Sign in</button>
            <button class="btn-signup" onclick="openSignup()">Sign up</button>
        </div>
    </header>

    <main class="container">
        <!-- (كل الكود ديالك بقى كيف هو بلا تغيير) -->
    </main>

    <!-- 🔥 LOGIN / SIGNUP MODAL -->
    <div id="authModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#00000088;justify-content:center;align-items:center;">
        <div style="background:#111;padding:20px;border-radius:10px;width:300px;">
            <h3 id="authTitle">Login</h3>
            <input id="authEmail" type="email" placeholder="Email" style="width:100%;margin:10px 0;padding:10px;">
            <input id="authPassword" type="password" placeholder="Password" style="width:100%;margin:10px 0;padding:10px;">
            <button onclick="submitAuth()" style="width:100%;padding:10px;">Continue</button>
            <button onclick="closeAuth()" style="width:100%;margin-top:10px;">Close</button>
        </div>
    </div>

    <script src="ControleAi.js"></script>

    <!-- 🔥 FIREBASE + AUTH -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut } 
        from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDWch9gK12sGD7awxmRibU6jBspd-tjr6E",
            authDomain: "my-website-17f99.firebaseapp.com",
            projectId: "my-website-17f99",
            storageBucket: "my-website-17f99.firebasestorage.app",
            messagingSenderId: "799668604107",
            appId: "1:799668604107:web:adc03ea5fd66c58af09f4e",
            measurementId: "G-H1SLRSEBTF"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        let mode = "login";

        window.openLogin = () => {
            mode = "login";
            document.getElementById("authTitle").innerText = "Login";
            document.getElementById("authModal").style.display = "flex";
        };

        window.openSignup = () => {
            mode = "signup";
            document.getElementById("authTitle").innerText = "Sign Up";
            document.getElementById("authModal").style.display = "flex";
        };

        window.closeAuth = () => {
            document.getElementById("authModal").style.display = "none";
        };

        window.submitAuth = async () => {
            const email = document.getElementById("authEmail").value;
            const password = document.getElementById("authPassword").value;

            try {
                if (mode === "signup") {
                    await createUserWithEmailAndPassword(auth, email, password);
                    alert("Account created");
                } else {
                    await signInWithEmailAndPassword(auth, email, password);
                    alert("Logged in");
                }
                closeAuth();
            } catch (e) {
                alert(e.message);
            }
        };
    </script>

    <script>
        lucide.createIcons();
        AI.init("messages", "https://my-webxyu.vercel.app/api/chat");

        const homeView = document.getElementById("home");
        const chatView = document.getElementById("chat");
        const imagineView = document.getElementById("imagine");

        function autoResize(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = Math.min(textarea.scrollHeight, 200) + 'px';
        }

        function handleKeydown(event, type) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                if (type === 'home') startChat();
                else send();
            }
        }

        function startChat() {
            const input = document.getElementById("homeInput");
            const text = input.value.trim();
            if (!text) return;
            
            homeView.classList.add("hidden");
            chatView.classList.remove("hidden");
            imagineView.classList.add("hidden");

            AI.user(text);
            input.value = "";
            input.style.height = 'auto';
            AI.ask(text);
        }

        function send() {
            const input = document.getElementById("chatInput");
            const text = input.value.trim();
            if (!text) return;
            AI.user(text);
            input.value = "";
            input.style.height = 'auto';
            AI.ask(text);
        }

        function openImagine() {
            homeView.classList.add("hidden");
            chatView.classList.add("hidden");
            imagineView.classList.remove("hidden");
        }
    </script>
</body>
</html>
